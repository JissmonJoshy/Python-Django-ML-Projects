{% extends "User/common.html" %}
{% load static %}
{% block content %}

<style>
.workout-card {
    max-width: 900px;
    margin: 50px auto;
    background: #2e2828;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
}

.workout-title {
    text-align: center;
    font-weight: 700;
    margin-bottom: 25px;
}

.form-label {
    font-weight: 600;
}

.recommend-box {
    background: #352c2c;
    border-left: 6px solid #0d6efd;
    padding: 20px;
    border-radius: 8px;
    margin-top: 30px;
}

.exercise-steps {
    text-align: left;
    margin-top: 15px;
    padding-left: 15px;
}

.btn-submit {
    background-color: #0d6efd;
    border: none;
    color: white;
    font-weight: 600;
}

.btn-submit:hover {
    background-color: #0b5ed7;
}
</style>

<div class="container py-5">
    <div class="workout-card">
        <h2 class="workout-title">🏋️ Workout Recommendation</h2>

        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Weight (kg)</label>
                    <input type="number" step="0.1" name="weight" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Height (m)</label>
                    <input type="number" step="0.01" name="height" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">BMI</label>
                    <input type="number" step="0.01" name="bmi" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Body Fat (%)</label>
                    <input type="number" step="0.1" name="fat" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Workout Frequency (days/week)</label>
                    <input type="number" name="frequency" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Experience Level</label>
                    <select name="experience" class="form-select" required>
                        <option value="">Select</option>
                        <option value="1">Beginner</option>
                        <option value="2">Intermediate</option>
                        <option value="3">Advanced</option>
                    </select>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-submit px-5 py-2">
                    🔍 Recommend Workout
                </button>
            </div>
        </form>

        {% if recommendation %}
        <div class="recommend-box text-center">
            <h5 class="mb-2">🔥 Recommended Workout Type</h5>
            <h4 class="text-primary">{{ recommendation }}</h4>
            <hr>
            <h5 class="mb-2">📋 Exercise Steps</h5>
            <div class="exercise-steps">
                <p>{{ exercise_steps }}</p>
            </div>
        </div>
        {% endif %}
    </div>
</div>

{% endblock %}
