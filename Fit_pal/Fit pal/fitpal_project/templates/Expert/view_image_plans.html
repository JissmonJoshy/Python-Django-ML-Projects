{% extends "Expert/common.html" %}
{% load static %}
{% block content %}
<br><br>
<div class="container mt-5">
    <h2 class="text-center mb-4">Fitness & Diet Image Plans</h2>
    <div class="row">
        {% for plan in image_plans %}
        <div class="col-md-6 col-lg-4 mb-4">
            <div class="card shadow-sm h-100">
                <img src="{{ plan.image.url }}" class="card-img-top" alt="Plan Image" style="height:250px; object-fit:cover;">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold">{{ plan.title }}</h5>
                    <p class="card-text text-muted">{{ plan.description }}</p>
                    
                    <div class="mt-auto">
                        <a href="{% url 'edit_image_plan' plan.id %}" class="btn btn-warning btn-sm w-100 mb-2">Edit</a>
                        <a href="{% url 'delete_image_plan' plan.id %}" 
                           class="btn btn-danger btn-sm w-100"
                           onclick="return confirm('Are you sure you want to delete this plan?');">
                           Delete
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12">
            <div class="alert alert-info text-center">
                No image plans uploaded yet.
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
