{% extends "Expert/common.html" %}
{% load static %}
{% block content %}
<br><br><br><br><br><br><br>
<div class="container mt-4">
    <h2 class="mb-3">Add Diet Program</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group mb-2">
            <label>Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>

        <div class="form-group mb-2">
            <label>Description</label>
            <textarea name="description" class="form-control" required></textarea>
        </div>

        <h5 class="mt-3">Steps</h5>
        <div id="steps-container">
            <div class="form-group mb-2">
                <input type="text" name="steps[]" class="form-control" placeholder="Step 1" required>
            </div>
        </div>
            <button type="button" class="btn btn-secondary mt-2" onclick="addStep()">+ Add Step</button>
            <br>
            <button type="submit" class="btn btn-primary mt-3">Save Program</button>
    </form>
</div>
<br><br><br>
<script>
function addStep() {
    let container = document.getElementById("steps-container");
    let count = container.children.length + 1;
    let input = document.createElement("div");
    input.classList.add("form-group", "mb-2");
    input.innerHTML = `<input type="text" name="steps[]" class="form-control" placeholder="Step ${count}" required>`;
    container.appendChild(input);
}
</script>

{% endblock %}
