{% extends "Expert/common.html" %}
{% load static %}
{% block content %}
<br><br><br><br>
<div class="container mt-5 d-flex justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-success text-white text-center">
                <h4 class="mb-0">Upload Fitness/Diet Plan (Video)</h4>
            </div>
            <div class="card-body bg-light">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" name="title" class="form-control" placeholder="Enter plan title" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea name="description" rows="4" class="form-control" placeholder="Briefly describe the plan" required></textarea>
                    </div>

                    <div class="mb-4">
                        <label for="video" class="form-label">Upload Video</label>
                        <input type="file" name="video" class="form-control" accept="video/*" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Upload Plan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<br><br>

{% endblock %}
