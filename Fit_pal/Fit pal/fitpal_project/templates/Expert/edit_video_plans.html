{% extends "Expert/common.html" %}
{% load static %}
{% block content %}

<div class="container mt-5">
    <h2 class="text-center mb-4">Edit Fitness/Diet Video Plan</h2>
    <form method="POST" enctype="multipart/form-data" class="border p-4 rounded shadow bg-light">
        {% csrf_token %}
        <div class="form-group mb-3">
            <label for="title">Title</label>
            <input type="text" name="title" value="{{ plan.title }}" class="form-control" required>
        </div>
        <div class="form-group mb-3">
            <label for="description">Description</label>
            <textarea name="description" rows="4" class="form-control" required>{{ plan.description }}</textarea>
        </div>
        <div class="form-group mb-3">
            <label>Current Video</label><br>
            <video controls style="max-height: 200px; width: 100%;">
                <source src="{{ plan.video.url }}" type="video/mp4">
            </video>
        </div>
        <div class="form-group mb-3">
            <label for="video">Change Video (Optional)</label>
            <input type="file" name="video" class="form-control" accept="video/*">
        </div>
        <button type="submit" class="btn btn-success w-100">Update Plan</button>
    </form>
</div>

{% endblock %}
