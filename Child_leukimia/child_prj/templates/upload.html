{% extends 'commonbase.html' %}
{% block content %}

<style>

.leukemia-wrapper{
    min-height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 15px;
    background: linear-gradient(135deg,#e8f0ff,#f6fbff);
}

.card-box{
    width:100%;
    max-width:500px;
    padding:35px;
    border-radius:15px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.title{
    text-align:center;
    margin-bottom:25px;
    font-weight:bold;
    color:#2c3e50;
}

.btn-upload{
    width:100%;
    background:#007bff;
    border:none;
    padding:10px;
    font-weight:600;
}

.btn-upload:hover{
    background:#0056b3;
}

.result-box{
    margin-top:20px;
    padding:18px;
    border-radius:10px;
    background:#eaf7ff;
    text-align:center;
    font-size:17px;
    font-weight:600;
    color:#0c5460;
}

</style>

<div class="container leukemia-wrapper">


<div class="card-box">

    <h2 class="title">Leukemia Detection System</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <div class="mb-3">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn btn-upload">
            Upload Image
        </button>

    </form>

    {% if result %}
    <div class="result-box">

        Prediction: <strong>{{ result }}</strong><br>

        Diagnosis: <strong>{{ diagnosis }}</strong><br>

        Stage: <strong>{{ stage }}</strong><br>

        Confidence: <strong>{{ confidence }}%</strong>

    </div>
    {% endif %}

</div>


</div>

{% endblock %}
