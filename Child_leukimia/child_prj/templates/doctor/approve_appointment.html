<!DOCTYPE html>
<html>
<head>
    <title>Set Consultation Fee</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #e0f7fa, #e8f5e9);
        }

        .container{
            width: 100%;
            max-width: 400px;
            background-color: #ffffff;
            padding: 35px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h3{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label{
            font-size: 14px;
            color: #555;
        }

        input[type="number"]{
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            transition: 0.3s;
        }

        input[type="number"]:focus{
            border-color: green;
            outline: none;
            box-shadow: 0 0 5px rgba(0,128,0,0.2);
        }

        input[type="submit"]{
            width: 100%;
            padding: 12px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover{
            background-color: darkgreen;
        }

        @media (max-width: 480px){
            .container{
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h3>Set Consultation Fee</h3>

    <form method="POST">
        {% csrf_token %}

        <label>Enter Consultation Fee</label>
        <input type="number" name="fee" placeholder="Enter Fee Amount" min="0" required>

        <input type="submit" value="Approve Appointment">
    </form>
</div>

</body>
</html>
