{% include 'header.html' %}

    <div class="pagetitle">
        <h1>Dashboard</h1>

            <li class="breadcrumb-item active">Dashboard</li>

      <section class="section dashboard">

          <div class="col-lg-8">
            <div class="row">
  
              <!-- Sales Card -->
              <div class="col-xxl-4 col-md-6">
                <div class="card info-card sales-card">
  
                  <div class="filter">
                    <a class="icon" href="#" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></a>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">
                      <li class="dropdown-header text-start">
                        <h6>Filter</h6>
                      </li>
                      <li><button class="dropdown-item" onclick="timeperiod('all')">All</button></li>
                      <li><button class="dropdown-item" onclick="timeperiod('month')">This Month</button></li>
                    </ul>
                  </div>
  
                  <div class="card-body">
                    <h5 class="card-title">Withdrawals <span id="filterOneTitle">| This Month</span></h5>
  
                    <div class="d-flex align-items-center">
                      <div class="card-icon rounded-circle d-flex align-items-center justify-content-center">
                        <i class="bi bi-cash-stack"></i>
                      </div>
                      <div class="ps-3">
                        <h6 id="all" class="d-none">{{all_withdrawals}}</h6>
                        <h6 id="thisMonth">{{this_month_withdrawals}}</h6>
                        <!-- <span class="text-success small pt-1 fw-bold">12%</span> <span class="text-muted small pt-2 ps-1">increase</span> -->
  
                      </div>
                    </div>
                  </div>
  
                </div>
              </div><!-- End Sales Card -->
  
              <!-- Revenue Card -->
              <div class="col-xxl-4 col-md-6">
                <div class="card info-card revenue-card">
  
                  <div class="filter">
                    <a class="icon" href="#" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></a>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">
                      <li class="dropdown-header text-start">
                        <h6>Filter</h6>
                      </li>
  
                      <li><button class="dropdown-item" onclick="depositTimeperiod('all')">All</button></li>
                      <li><button class="dropdown-item" onclick="depositTimeperiod('month')">This Month</button></li>
                    </ul>
                  </div>
  
                  <div class="card-body">
                    <h5 class="card-title">Deposits <span>| This Month</span></h5>
  
                    <div class="d-flex align-items-center">
                      <div class="card-icon rounded-circle d-flex align-items-center justify-content-center">
                        <i class="bi bi-cash-stack"></i>
                      </div>
                      <div class="ps-3">
                        <h6 id="allDepoits" class="d-none">{{all_deposits}}</h6>
                        <h6 id="thisMonthDepoits">{{this_month_deposits}}</h6>
                        <!-- <span class="text-success small pt-1 fw-bold">8%</span> <span class="text-muted small pt-2 ps-1">increase</span> -->

                      </div>
                    </div>
                  </div>
  
                </div>
              </div><!-- End Revenue Card -->
  
              <!-- Customers Card -->

                <div class="card info-card customers-card">
  
                  <div class="filter">

                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">

                      </div>

                        <h6>1244</h6>

                    </div>
  
                  </div>
                </div> 
  
              </div>-->
              <!-- End Customers Card -->

  
            </div>
          </div><!-- End Left side columns -->
  
          <!-- Right side columns -->
          <div class="col-lg-4">
  
  
  
            <!-- Website Traffic -->
            <div class="card">
  
              <div class="card-body pb-0">
                <h5 class="card-title">Branches : Customers </h5>
  
                <div id="trafficChart" style="min-height: 400px;" class="echart"></div>
  
                <script>
                  document.addEventListener("DOMContentLoaded", () => {
                    echarts.init(document.querySelector("#trafficChart")).setOption({
                      tooltip: {
                        trigger: 'item'
                      },
                      legend: {
                        top: '5%',
                        left: 'center'
                      },
                      series: [{
                        name: 'Access From',
                        type: 'pie',
                        radius: ['40%', '70%'],
                        avoidLabelOverlap: false,
                        label: {
                          show: false,
                          position: 'center'
                        },
                        emphasis: {
                          label: {
                            show: true,
                            fontSize: '18',
                            fontWeight: 'bold'
                          }
                        },
                        labelLine: {
                          show: false
                        },
                        data: [{
                            value: {{ user.no_of_branches }},
                            name: 'Bracnches'
                          },
                          {
                            value: {{user.no_of_customers}},
                            name: 'Customers'
                          },
                        ]
                      }]
                    });
                  });
                </script>
  
              </div>
            </div><!-- End Website Traffic -->
  
  
          </div><!-- End Right side columns -->

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <script>
    function timeperiod(period) {
      if (period == 'month') {
        document.getElementById('filterOneTitle').innerHTML = '| This Month';
        document.getElementById('thisMonth').classList.remove('d-none');
        document.getElementById('all').classList.add('d-none');
      } else {
        document.getElementById('filterOneTitle').innerHTML = '| All Time';
        document.getElementById('thisMonth').classList.add('d-none');
        document.getElementById('all').classList.remove('d-none');
      }
    }
    function depositTimeperiod(period) {
      if (period == 'month') {
        document.getElementById('thisMonthDepoits').classList.remove('d-none');
        document.getElementById('allDepoits').classList.add('d-none');
      } else {
        document.getElementById('thisMonthDepoits').classList.add('d-none');
        document.getElementById('allDepoits').classList.remove('d-none');
      }
    }
  </script>
