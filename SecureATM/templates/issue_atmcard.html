{% include 'header.html' %}
    <div class="container">

      <section class="section register min-vh-100 d-flex flex-column align-items-center justify-content-center py-4">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-6 col-md-6 d-flex flex-column align-items-center justify-content-center">

              <!-- <div class="d-flex justify-content-center py-4">
                <a href="index.html" class="logo d-flex align-items-center w-auto">
                  <img src="../static/assets/img/logo.png" alt="">
                  <span class="d-none d-lg-block">NiceAdmin</span>
                </a>
              </div> -->
              <!-- End Logo -->

              <div class="card mb-3">

                <div class="card-body">

                  <div class="pt-4 pb-2">
                    <h5 class="card-title text-center pb-0 fs-4">Add Card Details</h5>
                    <p class="text-center small">Enter your personal details to create account</p>
                  </div>

                  <form class="row g-3 needs-validation" novalidate method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-floating mb-3">
                        <input required type="text" class="form-control" id="cardNo" name="cardNo" placeholder="Card Number" maxlength="16">
                        <label for="cardNo">Card Number</label>
                        <div class="invalid-feedback">Please, enter your card number!</div>
                    </div>

                    <div class="form-floating mb-3">
                        <input required type="text" class="form-control" id="cvv" name="cvv" placeholder="CVV" maxlength="3">
                        <label for="cvv">CVV</label>
                        <div class="invalid-feedback">Please, enter your CVV!</div>
                    </div>

                    <div class="form-floating mb-3">
                        <input required type="date" class="form-control" id="expiryDate" name="expiryDate" placeholder="Expiry Date">
                        <script>
                            document.addEventListener('DOMContentLoaded', function() {
                                const expiryDateInput = document.getElementById('expiryDate');
                                const today = new Date().toISOString().split('T')[0];
                                expiryDateInput.setAttribute('min', today);
                            });
                        </script>
                        <label for="expiryDate">Expiry Date</label>
                        <div class="invalid-feedback">Please, enter the expiry date!</div>
                    </div>


                    <div class="col-12">
                      <button class="btn btn-primary w-100" type="submit">Issue ATM Card</button>
                    </div>
                  </form>

                </div>
              </div>

              <div class="credits">
                <!-- All the links in the footer should remain intact. -->
                <!-- You can delete the links only if you purchased the pro version. -->
                <!-- Licensing information: https://bootstrapmade.com/license/ -->
                <!-- Purchase the pro version with working PHP/AJAX contact form: https://bootstrapmade.com/nice-admin-bootstrap-admin-html-template/ -->
                <!-- Designed by <a href="https://bootstrapmade.com/">BootstrapMade</a> -->
              </div>

            </div>
          </div>
        </div>

      </section>

    </div>

  <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>


{% include 'footer.html' %}
