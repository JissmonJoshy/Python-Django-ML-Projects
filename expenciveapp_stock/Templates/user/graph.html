{% extends "user/common_base.html" %}

{% block content %}
<style>
    .overview-container {
        max-width: 900px;
        margin: auto;
        text-align: center;
    }
    .overview-container h1 {
        color: black;
        margin-bottom: 20px;
    }
    .overview-container img {
        width: 100%;
        max-width: 750px; /* Increased graph size */
        display: block;
        margin: 20px auto;
        border-radius: 8px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
    }
    .income-summary {
        background-color: #f9f9f9;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        display: inline-block;
        text-align: left;
        width: 80%;
    }
    .income-summary p {
        font-size: 18px;
        font-weight: 500;
        color: #333;
        margin: 8px 0;
    }
</style>

<br><br>
<div class="overview-container">
    <h1>Income and Expenses Overview</h1>

    <!-- Display the enlarged graph -->
    <img src="data:image/png;base64,{{ graph_url }}" alt="Income and Expense Chart">

    <!-- Display total annual income, expenses, and net income -->
    <div class="income-summary">
        <p><strong>Total Monthly Income:</strong> {{ total_monthly_income }}</p>
        <p><strong>Total Monthly Expenses:</strong> {{ total_monthly_expenses }}</p>
        <p><strong>Net Monthly Income:</strong> {{ net_monthly_income }}</p>
    </div>
</div>

{% endblock %}
