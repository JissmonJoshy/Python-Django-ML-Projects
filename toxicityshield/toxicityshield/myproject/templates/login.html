{% extends "base.html" %}
{% block content %}


    <div class="row min-vh-100 align-items-center justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="card-body">
                    <h4 class="text-center mb-4 font-weight-bold">LOGIN</h4>
                    <form action="" method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <input type="text" class="form-control" name="log_email" placeholder="Email ID" required>
                        </div>
                        <div class="form-group mb-4">
                            <input type="password" class="form-control" name="log_password" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block mb-3">Login</button>
                        <div class="text-center">
                            <a href="/register_user" class="text-muted small">Don't have an account? <span class="text-primary">Register</span></a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
{% endblock %}
