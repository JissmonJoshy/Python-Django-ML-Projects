{% extends "user/user_base.html" %}
{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    :root {
      --primary-color: #6366f1;
      --secondary-color: #a855f7;
      --chat-bg: #f8fafc;
      --bot-msg-bg: #fff;
      --user-msg-bg: #6366f1;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    .chatbot-wrapper {
        font-family: 'Outfit', sans-serif;
        background: #f1f5f9 url("https://www.transparenttextures.com/patterns/cubes.png");
        min-height: calc(100vh - 70px);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
    }

    .chat-card {
        width: 100%;
        max-width: 800px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        display: flex;
        flex-direction: column;
        height: 70vh;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .chat-header {
        padding: 24px 32px;
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .bot-avatar {
        width: 48px;
        height: 48px;
        background: var(--primary-color);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 1.5rem;
    }

    .chat-header-info h3 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-main);
        margin: 0;
    }

    .chat-header-info p {
        font-size: 0.875rem;
        color: #22c55e;
        margin: 0;
        font-weight: 500;
    }

    .chat-body {
        flex: 1;
        padding: 32px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 24px;
    }

    .chat-body::-webkit-scrollbar {
        width: 6px;
    }

    .chat-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
    }

    .msg {
        max-width: 80%;
        display: flex;
        flex-direction: column;
    }

    .msg.user {
        align-self: flex-end;
    }

    .msg.bot {
        align-self: flex-start;
    }

    .msg-content {
        padding: 16px 20px;
        border-radius: 20px;
        font-size: 1rem;
        line-height: 1.6;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .user .msg-content {
        background: var(--primary-color);
        color: #fff;
        border-bottom-right-radius: 4px;
    }

    .bot .msg-content {
        background: #fff;
        color: var(--text-main);
        border-bottom-left-radius: 4px;
        border: 1px solid #e2e8f0;
    }

    .msg-label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 6px;
        color: var(--text-muted);
    }

    .user .msg-label {
        align-self: flex-end;
    }

    .chat-footer {
        padding: 24px 32px;
        background: #fff;
        border-top: 1px solid #e2e8f0;
    }

    .input-group-modern {
        display: flex;
        gap: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        padding: 8px;
        border-radius: 16px;
        transition: all 0.2s;
    }

    .input-group-modern:focus-within {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        background: #fff;
    }

    .input-group-modern input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        padding: 12px 16px;
        font-size: 1rem;
        color: var(--text-main);
    }

    .input-group-modern button {
        background: var(--primary-color);
        color: #fff;
        border: none;
        padding: 0 24px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .input-group-modern button:hover {
        background: var(--secondary-color);
        transform: translateY(-1px);
    }

    .input-group-modern button i {
        font-size: 0.9rem;
    }
</style>

<div class="chatbot-wrapper">
    <div class="chat-card">
        <div class="chat-header">
            <div class="bot-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div class="chat-header-info">
                <h3>TOXICITY SHIELD AI</h3>
                <p>Always active</p>
            </div>
        </div>

        <div class="chat-body" id="chatBody">
            <div class="msg bot">
                <span class="msg-label">SHIELD Bot</span>
                <div class="msg-content">
                    Hello! I'm your AI assistant. How can I help you today?
                </div>
            </div>

            {% if question %}
            <div class="msg user">
                <span class="msg-label">You</span>
                <div class="msg-content">
                    {{question}}
                </div>
            </div>
            {% endif %}

            {% if answer %}
            <div class="msg bot">
                <span class="msg-label">SHIELD Bot</span>
                <div class="msg-content">
                    {{answer}}
                </div>
            </div>
            {% endif %}
        </div>

        <div class="chat-footer">
            <form method="post">
                {% csrf_token %}
                <div class="input-group-modern">
                    <input type="text" name="question" placeholder="Ask EmoShield a question..." required autocomplete="off">
                    <button type="submit">
                        Send <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const chatBody = document.getElementById('chatBody');
        chatBody.scrollTop = chatBody.scrollHeight;
    });
</script>
{% endblock %}
