{% extends "user/user_base.html" %}
{% block content %}


    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card p-4">
                <div class="card-body">
                    <h2 class="text-center font-weight-bold mb-4">Share Your Feedback</h2>
                    <p class="text-center text-muted mb-4">Your insights help us keep TOXICITY SHIELD safe and supportive.</p>
                    <form id="contact" method="post">
                        {% csrf_token %}
                        <div class="form-group mb-3">
                            <label class="font-weight-bold small">Full Name</label>
                            <input name="feed_name" id="feed_name" type="text" class="form-control" placeholder="Enter your name" required>
                        </div>
                        <div class="form-group mb-3">
                            <label class="font-weight-bold small">Email Address</label>
                            <input name="feed_email" id="email" type="email" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group mb-4">
                            <label class="font-weight-bold small">Your Message</label>
                            <textarea name="feed_message" id="message" class="form-control" placeholder="What's on your mind?" rows="5" required></textarea>
                        </div> 
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary px-5 btn-lg">Submit Feedback</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock  %}
