<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - TOXICITY SHIELD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/391827d54c.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .payment-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .card-chip {
            width: 50px;
            height: 40px;
            background: linear-gradient(135deg, #ffd700 0%, #daa520 100%);
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .form-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: rgba(255, 255, 255, 0.7);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: none;
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .pay-btn {
            background: #fff;
            color: #6366f1;
            border: none;
            border-radius: 15px;
            padding: 16px;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            background: #f8fafc;
        }

        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h4 class="font-weight-bold mb-1">Secure Payment</h4>
                <p class="small text-white-50">Caretaker Consultation Fee</p>
            </div>
            <i class="fab fa-cc-visa fa-3x"></i>
        </div>

        <div class="card-chip"></div>

        <form action="{% url 'payment' id %}" method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Card Number</label>
                <input type="text" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Cardholder Name</label>
                <input type="text" class="form-control" placeholder="JOHN DOE" required>
            </div>

            <div class="row">
                <div class="col-6">
                    <div class="mb-0">
                        <label class="form-label">Expiration</label>
                        <input type="text" class="form-control" placeholder="MM/YY" maxlength="5" required>
                    </div>
                </div>
                <div class="col-6">
                    <div class="mb-0">
                        <label class="form-label">CVV</label>
                        <input type="password" class="form-control" placeholder="***" maxlength="3" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="pay-btn">
                Confirm Rs 499.00
            </button>
            <div class="secure-badge">
                <i class="fas fa-lock"></i> SSL Secure Connection
            </div>
        </form>
    </div>

    <script>
        // Optional: Add card number formatting logic here
    </script>
</body>
</html>
