{% extends "user/user_base.html" %}
{% block content %}
    <div class="row gutters mt-4">
        {% for i in user %}
        <div class="col-xl-3 col-lg-3 col-md-12">
            <div class="card h-100">
                <div class="card-body">
                    <div class="account-settings text-center">
                        <div class="user-profile mb-4">
                            <div class="user-avatar mb-3">
                                <img id="profileImagePreview" src="../static/assets/image/{{i.profile_image}}" style="width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 4px solid var(--glass-border);">
                            </div>
                            <h5 class="font-weight-bold">{{i.u_fullname}}</h5>
                            <h6 class="text-muted">{{i.u_email}}</h6>
                        </div>
                        <form action="" method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="form-group text-left">
                                <label class="small font-weight-bold">Profile Image</label>
                                <input type="file" class="form-control-file small" id="profileImage" name="Profile_image" accept="Image/*">
                            </div>
                            <div class="form-group text-left">
                                <label class="small font-weight-bold">Background Image</label>
                                <input type="file" class="form-control-file small" id="backgroundImage" name="background_image" accept="Image/*">
                            </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-9 col-lg-9 col-md-12">
            <div class="card h-100">
                <div class="card-body">
                    <div class="row">
                        <div class="col-12 mb-3">
                            <h5 class="text-primary font-weight-bold">Personal Details</h5>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-group">
                                <label>Username</label>
                                <input type="text" class="form-control" name="username" value="{{i.u_fullname}}" placeholder="Enter full name">
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" class="form-control" name="email" value="{{i.u_email}}" placeholder="Enter email ID">
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="text" class="form-control" name="phone" value="{{i.u_phone}}" placeholder="Enter phone number">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12 mb-3 mt-4">
                            <h5 class="text-primary font-weight-bold">About</h5>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-group">
                                <label>Live In?</label>
                                <input type="text" class="form-control" value="{{i.u1}}" name="u1" placeholder="City/State">
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-group">
                                <label>Work at?</label>
                                <input type="text" class="form-control" value="{{i.u_about}}" name="u_about" placeholder="Company/Business">
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-group">
                                <label>From?</label>
                                <input type="text" class="form-control" name="u_from" value="{{i.u_from}}" placeholder="Home Town">
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-group">
                                <label>Went to?</label>
                                <input type="text" class="form-control" name="u2" value="{{i.u2}}" placeholder="School/College">
                            </div>
                        </div>
                        <div class="col-12 mb-4">
                            <div class="form-group">
                                <label>Short Profile</label>
                                <textarea class="form-control" rows="4" name="u_profile" placeholder="Tell us about yourself...">{{i.u_profile}}</textarea>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <button type="submit" class="btn btn-primary px-5">Update Profile</button>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
        </form>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#profileImage').on('change', function() {
                var reader = new FileReader();
                reader.onload = function(e) {
                    $('#profileImagePreview').attr('src', e.target.result);
                }
                reader.readAsDataURL(this.files[0]);
            });
        });
    </script>
{% endblock  %}
