{% extends "user/user_base.html" %}

{% block content %}
    <div class="row justify-content-center mt-5">
        <div class="col-md-7">
            <div class="card p-4">
                <div class="card-body">
                    <h4 class="font-weight-bold mb-4">Create a New Post</h4>
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="form-group mb-4">
                            <textarea class="form-control" rows="6" name="post_desc" placeholder="What's in your mind?" required style="background: rgba(255,255,255,0.2); border: 1px solid var(--glass-border); border-radius: 15px; color: var(--text-main);"></textarea>
                        </div>
                        
                        <div class="form-group mb-4">
                            <div class="custom-file-upload p-4 text-center" style="border: 2px dashed var(--glass-border); border-radius: 20px; transition: all 0.3s ease;">
                                <label for="imageUpload" class="mb-0" style="cursor: pointer;">
                                    <i class="fas fa-image fa-3x mb-3 text-primary"></i>
                                    <p class="mb-0 font-weight-bold">Select images to upload</p>
                                    <input type="file" id="imageUpload" name="post_images" multiple accept="image/*" onchange="previewImages(event)" style="display: none;" required>
                                </label>
                            </div>
                        </div>

                        <div id="imagePreview" class="d-flex flex-wrap gap-2 mb-4"></div>

                        <div class="text-right">
                            <button type="submit" class="btn btn-primary px-5">Publish Post</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
<style>
    #imagePreview img {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 12px;
        margin-right: 10px;
        margin-bottom: 10px;
        border: 2px solid var(--glass-border);
    }
    .custom-file-upload:hover {
        background: rgba(255,255,255,0.1);
        border-color: var(--accent-color);
    }
</style>

<script>
    function previewImages(event) {
        var preview = document.getElementById('imagePreview');
        preview.innerHTML = ''; // Clear previous preview images

        var files = event.target.files;

        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            var reader = new FileReader();

            reader.onload = function (e) {
                var image = document.createElement('img');
                image.src = e.target.result;
                preview.appendChild(image);
            };

            reader.readAsDataURL(file);
        }
    }
</script>

{% endblock  %}
