{% extends "common.html" %}
{% block content %}
{% load static %}

<section class="bg-half-150 d-table w-100 bg-light"
style="background: url('{% static 'assets/images/bg/bg-lines-one.png' %}') center;">

<div class="container">
<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card login-page shadow mt-4 rounded border-0">
<div class="card-body">

<h4 class="text-center">Pharmacist Registration</h4>

<form method="POST" enctype="multipart/form-data" class="login-form mt-4">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text"
class="form-control"
name="name"
pattern="[A-Za-z ]+"
title="Only letters allowed"
placeholder="Full Name"
required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email"
class="form-control"
name="email"
placeholder="example@gmail.com"
pattern="[a-zA-Z0-9._%+-]+@(gmail\.com|[a-zA-Z0-9.-]+\.in)"
title="Email must be gmail.com or .in domain"
required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password"
class="form-control"
name="password"
pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
title="Must contain uppercase, lowercase, number and minimum 8 characters"
required>
</div>

<div class="mb-3">
<label class="form-label">Phone</label>
<input type="text"
class="form-control"
name="phone"
pattern="[0-9]{10}"
maxlength="10"
title="Enter 10 digit phone number"
placeholder="Phone Number"
required>
</div>

<div class="mb-3">
<label class="form-label">Address</label>
<input type="text"
class="form-control"
name="address"
placeholder="Address"
required>
</div>

<div class="mb-3">
<label class="form-label">Pharmacy Name</label>
<input type="text"
class="form-control"
name="pharmacy_name"
pattern="[A-Za-z ]+"
title="Only letters allowed"
placeholder="Pharmacy Name"
required>
</div>

<div class="mb-3">
<label class="form-label">Pharmacy License Number</label>
<input type="text"
class="form-control"
name="pharmacy_license_number"
placeholder="License Number"
required>
</div>

<div class="mb-3">
<label class="form-label">Profile Image</label>
<input type="file" name="image" class="form-control" required>
</div>

<div class="d-grid">
<button class="btn btn-primary">Register</button>
</div>

<div class="text-center mt-3">
Already have account? 
<a href="/login">Login</a>
</div>
</form>

</div>
</div>

</div>
</div>
</div>

</section>

{% endblock %}
