{% extends "common.html" %}
{% block content %}
{% load static %}

<section class="bg-half-150 d-table w-100 bg-light"
style="background: url('{% static 'assets/images/bg/bg-lines-one.png' %}') center;">

<div class="container">
<div class="row justify-content-center">
<div class="col-lg-8">

<div class="card shadow mt-4 rounded border-0">
<div class="card-body">

<h4 class="text-center mb-4">User Registration</h4>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control"
placeholder="Enter Name"
pattern="[A-Za-z ]+"
title="Only letters allowed"
required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control"
placeholder="example@gmail.com"
pattern="[a-zA-Z0-9._%+-]+@(gmail\.com|[a-zA-Z0-9.-]+\.in)"
title="Use gmail.com or .in domain"
required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control"
pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
title="Must contain 8 characters, uppercase, lowercase and number"
required>
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control"
pattern="[0-9]{10}"
maxlength="10"
placeholder="10 digit phone number"
title="Enter exactly 10 digits"
required>
</div>

<div class="mb-3">
<label>Address</label>
<input type="text" name="address" class="form-control"
placeholder="Enter Address"
required>
</div>

<div class="mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control"
min="1" max="100"
placeholder="Enter Age"
required>
</div>

<div class="mb-3">
<label>Gender</label>
<select name="gender" class="form-control" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="mb-3">
<label>Blood Group</label>
<select name="blood_group" class="form-control" required>
<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>
</div>

<div class="mb-3">
<label>Profile Image</label>
<input type="file" name="image" class="form-control" required>
</div>

<button type="submit" class="btn btn-primary w-100">
Register
</button>

<div class="text-center mt-3">
Already have account? 
<a href="/login">Login</a>
</div>

</form>

</div>
</div>

</div>
</div>
</div>

</section>

{% endblock %}
