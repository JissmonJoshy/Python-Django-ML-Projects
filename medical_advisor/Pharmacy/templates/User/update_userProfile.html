{% extends "User/common.html" %}
{% block content %}
{% load static %}

<!-- ALERT MESSAGES -->
{% for message in messages %}
<script>
    alert("{{ message }}")
</script>
{% endfor %}

<section class="bg-light py-5" style="min-height: 100vh;">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">

                <div class="card shadow-lg border-0 rounded-4">

                    <div class="card-header text-center bg-primary text-white rounded-top-4">
                        <h4 class="mb-0">Update Profile</h4>
                    </div>

                    <div class="card-body p-4">

                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}

                            {% for i in data %}

                            <!-- NAME -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text"
                                       name="name"
                                       value="{{ i.name }}"
                                       class="form-control"
                                       required
                                       pattern="[A-Za-z ]{3,50}"
                                       title="Only letters allowed (3–50 characters)">
                            </div>

                            <!-- PHONE -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Phone Number</label>
                                <input type="text"
                                       name="phone"
                                       value="{{ i.phone }}"
                                       class="form-control"
                                       required
                                       maxlength="10"
                                       pattern="[0-9]{10}"
                                       oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                                       title="Enter exactly 10 digits">
                            </div>

                            <!-- ADDRESS -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Address</label>
                                <input type="text"
                                       name="address"
                                       value="{{ i.address }}"
                                       class="form-control"
                                       required
                                       minlength="5"
                                       maxlength="100"
                                       title="Address must be 5–100 characters">
                            </div>

                            <!-- IMAGE PREVIEW -->
                            <div class="mb-3 text-center">
                                {% if i.image %}
                                <img src="{{ i.image.url }}"
                                     alt="Profile Image"
                                     class="rounded-circle mb-2"
                                     width="100" height="100"
                                     style="object-fit: cover;">
                                {% else %}
                                <img src="{% static 'assets/images/default-user.png' %}"
                                     class="rounded-circle mb-2"
                                     width="100">
                                {% endif %}
                            </div>

                            <!-- IMAGE UPLOAD -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Profile Image</label>
                                <input type="file"
                                       name="image"
                                       class="form-control"
                                       accept="image/*">
                            </div>

                            <!-- BUTTON -->
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg rounded-3">
                                    Update Profile
                                </button>
                            </div>

                            {% endfor %}
                        </form>

                    </div>
                </div>

            </div>
        </div>

    </div>
</section>

{% endblock %}
