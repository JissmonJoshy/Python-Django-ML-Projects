{% extends "User/common.html" %}
{% block content %}

<section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow rounded overflow-hidden">
                    <ul class="nav nav-pills nav-justified flex-column flex-sm-row rounded-0 shadow overflow-hidden bg-light mb-0">
                        <li class="nav-item">
                            <a class="nav-link rounded-0 active" id="clinic-booking" data-bs-toggle="pill" href="#pills-clinic" role="tab" aria-controls="pills-clinic" aria-selected="false">
                                <div class="text-center pt-1 pb-1">
                                    <h5 class="fw-medium mb-0">Clinic Appointment</h5>
                                </div>
                            </a>
                        </li>
                    </ul>

                    <div class="tab-content p-4">
                        <div class="tab-pane fade show active" id="pills-clinic" role="tabpanel">
                            <form method="POST">
                                {% csrf_token %}
                                <div class="row">
                                    
                                    <!-- Select Doctor -->
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="dr" class="form-label">Select Doctor</label>
                                            <select name="dr" class="form-control" required>
                                                <option value="" disabled selected>Choose a doctor</option>
                                                {% for dr in drs %}
                                                    <option value="{{ dr.id }}">{{ dr.name }}--({{dr.specialization}})</option>
                                                {% endfor %}
                                            </select>       
                                        </div>
                                    </div>

                                    <!-- Booking Date -->
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="datePicker" class="form-label">Booking Date</label>
                                            <input name="date" id="datePicker" type="date" class="form-control" required>
                                        </div> 
                                    </div>

                                    <!-- Booking Time -->
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="time" class="form-label">Booking Time</label>
                                            <input name="time" type="time" class="form-control" required>
                                        </div> 
                                    </div>

                                    <!-- Description -->
                                    <div class="col-lg-12">
                                        <div class="mb-3">
                                            <label class="form-label">Description</label>
                                            <textarea name="desc" rows="4" class="form-control" required placeholder="Describe your issue..."></textarea>
                                        </div>
                                    </div>

                                    <!-- Submit Button -->
                                    <div class="col-lg-12">
                                        <div class="d-grid">
                                            <button type="submit" class="btn btn-primary">Book Appointment</button>
                                        </div>
                                    </div>

                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div><!--end col-->
        </div><!--end row-->
    </div><!--end container-->
</section>

<script>
    // Set the minimum selectable date to today
    document.getElementById("datePicker").setAttribute("min", new Date().toISOString().split('T')[0]);
</script>

{% endblock %}
