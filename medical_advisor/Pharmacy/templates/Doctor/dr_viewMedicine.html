{% extends "doctor/common.html" %}
{% block content %}

<div class="container mt-5">
    <!-- Title -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">Available Medicines</h2>
        <p class="text-muted">Browse or search for medicines in the list below</p>
    </div>

    <!-- Search Form -->
    <form method="GET" action="{% url 'dr_viewMedicine' %}" class="mb-5">
        <div class="input-group shadow-sm">
            <input type="text" name="q" class="form-control form-control-lg" placeholder="Search Medicine..." value="{{ query }}">
            <button type="submit" class="btn btn-outline-primary">Search</button>
        </div>
    </form>

    <!-- Medicine List with Flexbox -->
    <div class="d-flex flex-wrap justify-content-start gap-4">
        {% for i in data %}
        <div class="card shadow-sm border-0 rounded-4" style="width: 260px; flex: 0 0 auto;">
            <div class="position-relative">
                <img src="/static/assets/{{ i.image }}" class="card-img-top rounded-top-4" style="height: 180px; object-fit: cover;" alt="{{ i.name }}">
            </div>
            <div class="card-body p-3">
                <h5 class="card-title fw-semibold mb-1">{{ i.name }}</h5>
                <p class="card-text mb-1"><strong>Price:</strong> ₹{{ i.price }}</p>
                <p class="card-text mb-1"><strong>Quantity:</strong> {{ i.qty }}</p>
                <p class="card-text"><strong>Expiry:</strong> {{ i.expiry }}</p>
            </div>
            <div class="card-footer bg-white border-0 text-center pb-3">
                <a href="/dr_viewMedicinedetails?id={{ i.id }}" class="btn btn-sm btn-primary rounded-pill px-4">View</a>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center">
            <p class="text-danger fw-semibold">No medicines found.</p>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
