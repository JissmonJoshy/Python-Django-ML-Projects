{% extends 'adminbase.html' %}
{% block content %}
<style type="text/css">
	#log{
		background-color: rgba(0, 150, 220, 0.5);
		margin: 10px 150px;
		padding: 50px;
		color: white;
		width: 1000px;
		float: left;
	}

/*tr:nth-child(odd) {background-color: silver;}*/
</style>
<div style="margin: 100px;">
    <form method="POST">
        {% csrf_token %}
        <h3 class="text-center">Users</h3>
        <table border="0" style="margin:50px;" class="table table-secondary table-striped table-hover text-center"> 
      
            <tr>
                <th>SL/NO</th>
                <th>NAME</th>
                <th>EMAIL</th>
                <th>CONTACT</th>
                <th>ADDRESS</th>
              
            </tr>
            {% for d in data %}
            <tr>
                
                <td>{{forloop.counter}}</td>
                <td>{{d.name}}</td>
                <td>{{d.email}}</td>
                <td>{{d.phone}}</td>
                <td>{{d.address}}</td>

               
            </tr>
            {% endfor %}
        </table>
        </form>
        </div>
{% endblock %}
