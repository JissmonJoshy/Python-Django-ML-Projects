<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Melanoma Detection</title>
		<link rel="stylesheet" href="/static/css/BillCss.css" />
	</head>

	<body>
		<table class="body-wrap">
			<tbody>
				<tr>
					<td></td>
					<td class="container" width="900">
						<div class="content">
							<table class="main" width="110%">
								<tbody>
									<tr>
										<td class="content-wrap aligncenter">
											<table width="100%" cellpadding="0" cellspacing="0">
												<tbody>
													<tr>
														<td class="content-block">
															<h1 style="text-align: center">
																Token Print
															</h1>
														</td>
													</tr>
													<tr>
														<td class="content-block">
															<h2 style="text-align: center"></h2>
														</td>
													</tr>
													<tr>
														<td class="content-block">
															<table class="invoice">
																<tbody>
																	<tr>
																		<td style="width: 300px">
																			<strong>User:</strong>
																			{{data.uid.name}}<br />
																		</td>
																		<td>
																			<strong>DATE:</strong>
																			{{data.bookingdate}}<br />
																		</td>
																	</tr>
																	<tr>
																		<td colspan="2" style="text-align: center">
																			<p style="font-size: 20px; font-weight: 700;">Doctor: {{data.docid.name}} - {{data.docid.specialization}}</p>
																		</td>
																	</tr>

																	<tr>
																		<td colspan="2">
																			<table style="margin: auto;">
																				<tr>
																					<th>
																						<p style="font-size: 20px; font-weight: 700;">Token: {{data.token}}</p>
																					</th>
																				</tr>
																			</table>
																		</td>
																	</tr>
																</tbody>
															</table>
														</td>
													</tr>
													<tr>
														<td class="content-block">
															<input
																type="button"
																value="Print"
																onclick="myFun()"
																id="pt"
																style="padding: 10px"
															/>
														</td>
													</tr>
													<tr>
														<td class="content-block"></td>
													</tr>
												</tbody>
											</table>
										</td>
									</tr>
								</tbody>
							</table>
							<div class="footer">
								<table width="100%">
									<tbody>
										<tr></tr>
									</tbody>
								</table>
							</div>
						</div>
					</td>
					<td></td>
				</tr>
			</tbody>
		</table>
		<script>
			function myFun() {
				document.getElementById('pt').style.display = 'none';
				window.print();
				window.location = '/userbooking';
			}
		</script>
	</body>
</html>
