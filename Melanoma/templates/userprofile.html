{% extends 'userbase.html' %} {% block content %}
<style type="text/css">
	#log {
		background-color: rgba(0, 150, 220, 0.5);
		margin: 10px 150px;
		padding: 50px;
		color: white;
		width: 1000px;
		float: left;
	}
	td,
	th {
		padding: 10px;
	}
	#tbl {
		width: 900px;
	}
	a {
		color: #ebd231;
	}
	table {
		border-collapse: collapse;
		border: none;
	}

	th {
		background-color: rgba(0, 100, 180, 0.7);
		color: #ebd231;
	}
	/*tr:nth-child(odd) {background-color: silver;}*/
</style>
<div class="mt-5 mb-5" style="width: 100%">
	<form method="POST">
		{% csrf_token %}
		<h3 style="text-align: center">Profile</h3>
		<table style="margin: auto">
			<tr>
				<td>Name</td>
				<td>
					<input
						type="text"
						class="form-control"
						name="txtName"
						pattern="[a-zA-Z ]+"
						value="{{data.name}}"
						required
					/>
				</td>
			</tr>
			<tr>
				<td>Address</td>
				<td>
					<textarea class="form-control" name="txtAddress" required>
{{data.address}}</textarea
					>
				</td>
			</tr>
			<tr>
				<td>Contact</td>
				<td>
					<input
						type="text"
						class="form-control"
						name="txtContact"
						value="{{data.phone}}"
						pattern="[6789][0-9]{9}"
						required
					/>
				</td>
			</tr>
			<tr>
				<td>Email</td>
				<td>
					<input
						type="email"
						class="form-control"
						name="txtEmail"
						value="{{data.email}}"
						required
					/>
				</td>
			</tr>
			<tr>
				<td>Password</td>
				<td>
					<input
						type="password"
						class="form-control"
						name="txtPwd"
						pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$"
						required
					/>
				</td>
			</tr>
			<tr>
				<td></td>
				<td>
					<input
						type="submit"
						class="btn btn-primary"
						value="Update"
						name="btnSubmit"
						required
					/>
				</td>
			</tr>
		</table>
	</form>
</div>
<script>
	var msg = '{{msg}}';
	if (msg != '') {
		alert(msg);
		window.location = '/customerprofile';
	}
</script>
{% endblock %}
