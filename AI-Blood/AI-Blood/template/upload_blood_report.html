{% extends "lab_home.html" %}
{% block content %}

<style>
.form-container {
    max-width: 600px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border: 1px solid #ddd;
    border-radius: 6px;
}

.form-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 12px;
}

.form-group label {
    font-weight: bold;
    margin-bottom: 4px;
}

.form-group input {
    padding: 8px;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 10px;
    background: #2c7be5;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #1a5dcc;
}

@media(max-width:600px){
    .form-container {
        margin: 10px;
    }
}
</style>
<br><br><br><br>
<div class="form-container">
    <h2 style="color: black;">Upload Blood Test Values</h2>

    <p><b>Patient:</b> {{ booking.user.first_name }} {{ booking.user.last_name }}</p>
    <p><b>Lab:</b> {{ booking.lab.name }}</p>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>WBC</label>
            <input type="number" step="any" name="WBC" required>
        </div>

        <div class="form-group">
            <label>RBC</label>
            <input type="number" step="any" name="RBC" required>
        </div>

        <div class="form-group">
            <label>HGB</label>
            <input type="number" step="any" name="HGB" required>
        </div>

        <div class="form-group">
            <label>PLT</label>
            <input type="number" step="any" name="PLT" required>
        </div>

        <div class="form-group">
            <label>NEUT</label>
            <input type="number" step="any" name="NEUT" required>
        </div>

        <div class="form-group">
            <label>LYMPH</label>
            <input type="number" step="any" name="LYMPH" required>
        </div>

        <div class="form-group">
            <label>MONO</label>
            <input type="number" step="any" name="MONO" required>
        </div>

        <div class="form-group">
            <label>EOS</label>
            <input type="number" step="any" name="EOS" required>
        </div>

        <div class="form-group">
            <label>BASO</label>
            <input type="number" step="any" name="BASO" required>
        </div>

        <button type="submit">Generate Report</button>
    </form>
</div>
<br><br><br>
{% endblock %}
