{% extends 'index.html' %} {% block content %}

    
    

    <!-- Contact Section -->
    <section id="contact" class="contact section">

      <!-- Section Title -->
      <div class="container section-title" data-aos="fade-up">
        <h2>Supplier Registration</h2>
        <p></p>
      </div><!-- End Section Title -->

      <div class="container position-relative" data-aos="fade-up" data-aos-delay="100">

        <div class="row gy-4">
            <center>
                <div class="col-lg-7">
                    <form action="" method="post" class="" data-aos="fade-up" data-aos-delay="500" enctype="multipart/form-data">
                        {% csrf_token %}
                      <div class="row gy-4">
        
                        <div class="col-md-6">
                          <input type="text" name="name" pattern="[A-Za-z]{,}" class="form-control" placeholder="Shop Name" required="">
                        </div>

                        <div class="col-md-6">
                            <input type="text" name="owner_name" pattern="[A-Za-z]{,}" class="form-control" placeholder="Owner Name" required="">
                          </div>
        
                        <div class="col-md-6 ">
                          <input type="email" class="form-control" name="email" placeholder="Email" required="">
                        </div>
        
                        <div class="col-md-6">
                          <input pattern="[6789][0-9]{9}" maxlength="10" type="tel" name="phone" class="form-control" placeholder="Phone Number" required="">
                        </div>
                        
                        <div class="col-md-6 ">
                          <input type="text" class="form-control" name="licence" placeholder="Licence No."  required="">
                        </div>
                        
                        <div class="col-md-6 ">
                          <input type="file" class="form-control" name="image" placeholder="Shop Image"  required="">
                        </div>

                      <!-- <div class="col-md-6 ">
                          <input type="password" class="form-control" name="password" placeholder="Password" pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required="">
                        </div> -->

                        <div class="col-md-12">
                          <textarea class="form-control" name="address" rows="6" placeholder="Address" required=""></textarea>
                        </div>  
        
                      <!-- <center>

                        <div class="col-md-12">
                          <input type="text" name="airport"  class="form-control" placeholder="Airport" required="">
                        </div>
                        <br>

                        

                          
                      </center> -->
        
        
                        <div class="col-md-12 text-center">
        
                          <button type="submit" class="btn btn-info">Register</button>
                        </div>
        
                      </div>
                    </form>
                  </div><!-- End Contact Form -->
        
            </center>
        </div>

      </div>

    </section><!-- /Contact Section -->
{% endblock %}
