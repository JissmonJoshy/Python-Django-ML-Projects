{% extends 'index.html' %} {% block content %}

    
    

    <!-- Contact Section -->
    <section id="contact" class="contact section">

      <!-- Section Title -->
      <div class="container section-title" data-aos="fade-up">
        <h2>User Registration</h2>
        <p></p>
      </div><!-- End Section Title -->

      <div class="container position-relative" data-aos="fade-up" data-aos-delay="100">

        <div class="row gy-4">
            <center>
                <div class="col-lg-7">
                    <form action="" method="post" class="" data-aos="fade-up" data-aos-delay="500">
                        {% csrf_token %}
                      <div class="row gy-4">
        
                        <div class="col-md-6">
                          <input type="text" name="name" pattern="[A-Za-z]{,}" class="form-control" placeholder="Your Name" required="">
                        </div>
        
                        <div class="col-md-6 ">
                          <input type="email" class="form-control" name="email" placeholder="Your Email" required="">
                        </div>
        
                        <div class="col-md-6">
                          <input pattern="[6789][0-9]{9}" maxlength="10" type="tel" name="phone" class="form-control" placeholder="Your Phone Number" required="">
                        </div>
        
                        <div class="col-md-6 ">
                          <input type="number" class="form-control" name="age" placeholder="Age" min="10" required="">
                        </div>
        
        
                        <div class="col-md-12">
                          <textarea class="form-control" name="address" rows="6" placeholder="Your Address" required=""></textarea>
                        </div>
        
                        <div class="col-md-12 text-center">
        
                          <button type="submit" class="btn btn-info">Register</button>
                        </div>
        
                      </div>
                    </form>
                  </div><!-- End Contact Form -->
        
            </center>
        </div>

      </div>

    </section><!-- /Contact Section -->
{% endblock %}
