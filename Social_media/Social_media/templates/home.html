<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link href="{% static 'assets/images/favicon.png' %}" rel="icon" type="image/png">
    <!-- title and description-->
    <title>Instello</title>
    <meta name="description" content="Instello - Sharing Photos platform HTML Template">
    <!-- css files -->
    <link rel="stylesheet" href="{% static 'assets/css/tailwind.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <!-- google font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<body class="relative text-white">

<!-- ===== BACKGROUND IMAGE ===== -->
<div class="absolute inset-0">
    <img src="{% static 'assets/images/bg-social.jpg' %}" 
         class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-black/60"></div>
</div>

<!-- ===== NAVBAR ===== -->
<header class="relative z-10">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        
        <div class="flex items-center gap-3">
            <img src="{% static 'assets/images/logo-icon.png' %}" class="w-8">
            <h1 class="text-2xl font-bold">Instello</h1>
        </div>

        <nav class="hidden md:flex gap-8 items-center">
            <a href="/" class="hover:text-blue-400 transition">Home</a>
            <a href="/signup" class="hover:text-blue-400 transition">Sign Up</a>
            {% comment %} <a href="/features" class="hover:text-blue-400 transition">Features</a> {% endcomment %}
            {% comment %} <a href="/contact" class="hover:text-blue-400 transition">Contact</a> {% endcomment %}
            <a href="/log" class="bg-blue-600 px-5 py-2 rounded-lg hover:bg-blue-700 transition">Login</a>
        </nav>

    </div>
</header>

<!-- ===== HERO SECTION ===== -->
<section class="relative z-10 flex items-center justify-center h-screen text-center px-6">
    <div class="max-w-3xl">

        <h2 class="text-4xl md:text-6xl font-extrabold mb-6 leading-tight">
            Connect. Share. Inspire.
        </h2>

        <p class="text-lg md:text-xl text-gray-300 mb-8">
            A modern social media platform where your moments become memories.
        </p>

        <div class="flex justify-center gap-4">
            <a href="/signup" 
               class="bg-blue-600 px-8 py-3 rounded-lg text-lg font-semibold hover:bg-blue-700 transition shadow-lg">
               Get Started
            </a>

            <a href="/log" 
               class="border border-white px-8 py-3 rounded-lg text-lg hover:bg-white hover:text-black transition">
               Login
            </a>
        </div>

    </div>
</section>

</body>
