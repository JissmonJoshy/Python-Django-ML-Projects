{% extends 'admin/base.html' %}
{% block header %}

{% if messages %}
<script>
{% for message in messages %}
    alert("{{ message }}");
{% endfor %}
</script>
{% endif %}

<h2 style="text-align:center;">User Management</h2>
<table border="1" align="center" width="900">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Address</th>
        <th>Contact</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    {% for i in data %}
    <tr>
        <td>{{ i.id }}</td>
        <td>{{ i.uname }}</td>
        <td>{{ i.uaddress }}</td>
        <td>{{ i.ucontact }}</td>
        <td>{{ i.uemail }}</td>
        <td>
            <a href="?reject_id={{i.id}}" 
               onclick="return confirm('Are you sure you want to delete this user?')">
               Reject
            </a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="6" align="center">No Users Found</td>
    </tr>
    {% endfor %}
</table>

<br><br>

{% endblock %}
