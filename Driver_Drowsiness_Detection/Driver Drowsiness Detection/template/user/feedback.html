{% extends 'user/base.html' %}
{% block header %}

{% if messages %}
<script>
{% for message in messages %}
    alert("{{ message }}");
{% endfor %}
</script>
{% endif %}

<style>
.feedback-box {
    width: 400px;
    margin: 80px auto;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 0px 15px #ccc;
    background-color: #ffffff;
}
.feedback-box h2 {
    text-align: center;
}
.feedback-box input,
.feedback-box textarea {
    width: 100%;
    padding: 8px;
    margin: 10px 0;
}
.btn-submit {
    width: 100%;
    background-color: #007bff;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
}
</style>

<div class="feedback-box">
    <h2>Feedback for {{ booking.did.dname }}</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Rating (1-5)</label>
        <input style='color:black' type="number" name="rating" min="1" max="5" required>

        <label>Comment</label>
        <textarea name="comment" rows="4" required></textarea>

        <button type="submit" class="btn-submit">Submit Feedback</button>
    </form>
</div>

{% endblock %}
