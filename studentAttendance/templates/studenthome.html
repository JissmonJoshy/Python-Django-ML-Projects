{% extends "studentbase.html" %} {% block content %}
<section id="contact" class="contact">
	<div class="container">
		<div class="section-title">
			<h2></h2>
			<h3>PRO<span>FILE</span></h3>
		</div>

		<div class="row mt-5">
			<div class="col-lg-4">
				<div class="info">
					<img src="/static/img/recru.jpg" style="max-width: 100%" alt="" />
				</div>
			</div>

			<div class="col-lg-8 mt-5 mt-lg-0">
				<form action="/studenthome" method="post" role="form" class="ourForm">
					{% csrf_token %}
					<div class="row">
						<div class="col-md-12 form-group">
							<input
								type="text"
								name="adno"
								class="form-control bg-light"
								id="name"
								value="{{data.admno}}"
								placeholder="Admission No"
								readonly
							/>
						</div>
					</div>
					<div class="row">
						<div class="col-md-6 form-group">
							<input
								type="text"
								name="name"
								class="form-control"
								id="name"
								value="{{data.name}}"
								placeholder="Name"
								required
							/>
						</div>
						<div class="col-md-6 form-group mt-3 mt-md-0">
							<input
								type="email"
								class="form-control"
								name="email"
								id="email"
								value="{{data.email}}"
								placeholder="Email"
								required
							/>
						</div>
					</div>
					<div class="row">
						<div class="col-md-6 form-group">
							<input
								type="text"
								name="phone"
								class="form-control"
								id="name"
								placeholder="Phone"
								value="{{data.phone}}"
								pattern="[6789][0-9]{9}"
								maxlength="10"
								required
							/>
						</div>
						<div class="col-md-6 form-group mt-3 mt-md-0">
							<input
								type="text"
								class="form-control bg-light"
								id="name"
								value="{{data.acayear}}"
								readonly
							/>
						</div>
					</div>
					<div class="row">
						<div class="col-md-6 form-group">
							<input
								type="text"
								class="form-control bg-light"
								id="name"
								value="{{data.course.course}}"
								readonly
							/>
						</div>
						<div class="col-md-6 form-group mt-3 mt-md-0">
							<input
								type="text"
								class="form-control bg-light"
								id="name"
								value="{{data.course.dept.department}}"
								readonly
							/>
						</div>
					</div>
					<div class="form-group mt-3">
						<textarea
							class="form-control"
							name="address"
							rows="5"
							placeholder="Your Address"
							readonly
						>{{data.address}}</textarea
						>
					</div>
					<div class="row">
						<!-- <div class="col-md-6 form-group">
							<input
								type="password"
								name="ePass"
								class="form-control"
								id="ePass"
								placeholder="Enter New Password"
								pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$"
								required
							/>
						</div> -->
						<!-- <div class="col-md-6 form-group mt-3 mt-md-0">
							<input
								type="password"
								class="form-control"
								name="cPass"
								id="cPass"
								placeholder="Confirm Password"
								oninput="myFun(this.value)"
								pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$"
								required
							/> -->
						</div>
						<div
							class="bg-danger p-3 text-light"
							id="error-message"
							style="display: none"
						></div>
					</div>
					<div class="text-center">
						<!-- <button type="submit" id="subBtn">Update</button> -->
					</div>
				</form>
				<div class="{{sty}}" id="messageDiv">{{msg}}</div>
			</div>
		</div>
	</div>
</section>
<script>
	function myFun(cPass) {
		ePass = document.getElementById('ePass').value;
		console.log('CPass: ' + cPass);
		console.log('EPass: ' + ePass);
		if (cPass != ePass) {
			document.getElementById('subBtn').disabled = true;
			document.getElementById('error-message').style.display = 'block';
			document.getElementById('error-message').innerText =
				"Password Dosen't Match";
		} else {
			document.getElementById('subBtn').disabled = false;
			document.getElementById('error-message').style.display = 'none';
		}
	}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
	$(document).ready(function () {
		$('#dept').change(function () {
			var y = $('#dept').val();
			$('#course')
				.find('option')
				.remove()
				.end()
				.append('<option selected disabled>Select Course</option>')
				.val('whatever');
			$.ajax({
				url: '/getcourse?id=' + y,
				type: 'GET',
				success: function (data) {
					var jsondata = $.parseJSON(data);

					$(jsondata).each(function (index, o) {
						$('#course').append(
							$('<option></option>').text(o[2]).attr('value', o[0])
						);
					});
				},
			});
		});
	});
</script>
<script>
	$(document).ready(() => {
		$('#messageDiv').fadeOut(5000);
	});
</script>
{% endblock %}
