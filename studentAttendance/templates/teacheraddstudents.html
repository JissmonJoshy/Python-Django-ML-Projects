{% extends "teacherbase.html" %} {% block content %}
<section id="contact" class="contact">
	<div class="container">
		<div class="section-title">
			<h2>ADD</h2>
			<h3>STU<span>DENTS</span></h3>
		</div>

		<div class="row mt-5">
			<div class="col-lg-4">
				<div class="info">
					<img src="/static/img/recru.jpg" style="max-width: 100%" alt="" />
				</div>
			</div>

			<div class="col-lg-8 mt-5 mt-lg-0">
				<form action="" method="post" role="form" class="ourForm">
					<form action="" method="post" role="form" class="ourForm">
					{% csrf_token %}
					<div class="row">
						<div class="col-md-6 form-group">
							<input
								type="text"
								name="adno"
								class="form-control"
								id="name"
								placeholder="Admission No"
								required
							/>
						</div>
						<div class="col-md-6 form-group">
							<input
								type="text"
								name="name"
								class="form-control"
								id="name"
								placeholder="Name"
								required
							/>
						</div>
					</div>
					<div class="row">
						<div class="col-md-6 form-group mt-3 mt-md-0">
							<input
								type="email"
								class="form-control"
								name="email"
								id="email"
								placeholder="Email"
								required
							/>
						</div>
						<div class="col-md-6 form-group">
							<input
								type="text"
								name="phone"
								class="form-control"
								id="name"
								placeholder="Phone"
								pattern="[6789][0-9]{9}"
								maxlength="10"
								required
							/>
						</div>
					</div>
					<div class="row">
						
						<div class="col-md-6 form-group mt-3 mt-md-0">
							<select name="acayear" class="form-control" id="name" required>
								<option value="" selected disabled>Select Academic Year</option>
								<option value="2018-2021">2018-2021</option>
								<option value="2019-2022">2019-2022</option>
								<option value="2020-2023">2020-2023</option>
								<option value="2021-2024">2021-2024</option>
								<option value="2022-2025">2022-2025</option>
							</select>
						</div>
						<div class="col-md-6 form-group mt-3 mt-md-0">
							<select name="course" class="form-control" id="course" required>
								<option value="" selected disabled>Select Course</option>
								{% for c in courses %}
								<option value="{{c.id}}">{{c.course}}</option>
								{% endfor %}
							</select>
						</div>
					</div>
					<div class="form-group mt-3">
						<textarea
							class="form-control"
							name="address"
							rows="5"
							placeholder="Your Address"
							required
						></textarea>
					</div>
					<div class="text-center">
						<button type="submit" id="subBtn">Submit</button>
					</div>
				</form>
				<div class="{{sty}}" id="messageDiv">{{msg}}</div>
			</div>
		</div>
	</div>
</section>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
	$(document).ready(() => {
		$('#messageDiv').fadeOut(5000);
	});
</script>
{% endblock %}
