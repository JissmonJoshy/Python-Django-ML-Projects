{% extends "adminbase.html" %} {% block content %}
<section id="contact" class="contact">
	<div class="container">
		<div class="section-title">
			<h2>VIEW</h2>
			<h3>TEAC<span>HERS</span></h3>
		</div>

		<div class="w3-services-grids py-lg-4 text-center" style="padding: 20px">
			<div class="fea-gd-vv row">
				{% for i in datas %}
				<div
					class="col-lg-4 col-md-7 bg-info"
					style="margin-bottom: 30px; padding-bottom: 30px; border-radius: 20px"
				>
					<div class="feature-gd icon-yellow text-center">
						<div class="icon bg-info"></div>
						<div class="info bg-info" style="margin-top: 50px">
							<h3>{{i.name}}</h3>
							<h3>{{i.email}}</h3>
							<h4>{{i.phone}}</h4>
							<p>{{i.address}}</p>
							<p>{{i.dept.department}}</p>
						</div>
						<a href="/deleteTeacher?id={{i.user.id}}" class="btn btn-danger" style="margin: auto;" >Delete</a>
					</div>
				</div>
				{% endfor %}
			</div>
		</div>
	</div>
</section>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
	$(document).ready(() => {
		$('#messageDiv').fadeOut(5000);
	});
</script>
{% endblock %}
