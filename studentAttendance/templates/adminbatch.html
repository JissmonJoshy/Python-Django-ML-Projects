{% extends "adminbase.html" %} {% block content %}
<style>
	table {
		width: 100%;
		text-align: center;
	}
	table,
	td,
	th {
		border: 1px solid brown;
	}
	th,
	td {
		padding: 10px;
	}
</style>
<section id="contact" class="contact">
	<div class="container">
		<div class="section-title">
			<h2>Add</h2>
			<h3>COU<span>RSE</span></h3>
		</div>

		<div class="row mt-5">
			<div class="col-lg-12 mt-5 mt-lg-0">
				<form method="post" class="ourForm">
					{% csrf_token %}
					<div class="form-group mt-3">
						<input
							type="text"
							class="form-control"
							name="batch"
							id="subject"
							placeholder="Course Name"
							required
						/>
					</div>
					<div class="form-group mt-3">
						<select
							class="form-control"
							name="dept"
							id="subject"
							required
						>
						<option value="" selected disabled>Select Department</option>
						{% for d in depts %}
							<option value="{{d.id}}">{{d.department}}</option>
						{% endfor %}
						</select>
					</div>
					<div class="text-center">
						<button type="submit">SUBMIT</button>
					</div>
					<div class="{{sty}}" id="messageDiv">{{msg}}</div>
				</form>
			</div>
		</div>
		<div class="row mt-5">
			{% if data %}
			<table class="table table-light table-striped table-hover">
				<tr>
					<th>SlNO</th>
					<th>DEPARTMENT</th>
					<th>COURSE</th>
					<th>ACTION</th>
				</tr>
				{% for d in data %}
				<tr>
					<td>{{forloop.counter}}</td>
					<td>{{d.dept.department}}</td>
					<td>{{d.course}}</td>
					<td>
						<a href="/admindeletebatch?id={{d.id}}" title="Delete">❌</a>
					</td>
				</tr>
				{% endfor %}
			</table>
			{% endif %}
		</div>
	</div>
</section>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
	$(document).ready(() => {
		$('#messageDiv').fadeOut(5000);
	});
</script>

{% endblock %}
