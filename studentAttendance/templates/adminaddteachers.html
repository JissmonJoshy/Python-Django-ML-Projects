{% extends "adminbase.html" %} {% block content %}
<section id="contact" class="contact">
	<div class="container">
		<div class="section-title">
			<h2>ADD</h2>
			<h3>TEAC<span>HERS</span></h3>
		</div>

		<div class="row mt-5">
			<div class="col-lg-4">
				<div class="info">
					<img src="/static/img/recru.jpg" style="max-width: 100%" alt="" />
				</div>
			</div>

			<div class="col-lg-8 mt-5 mt-lg-0">
				<form action="" method="post" role="form" class="ourForm">
					{% csrf_token %}
					<div class="row">
						<div class="col-md-6 form-group">
							<input
								type="text"
								name="name"
								class="form-control"
								id="name"
								placeholder="Name"
								required
							/>
						</div>
						<div class="col-md-6 form-group mt-3 mt-md-0">
							<input
								type="email"
								class="form-control"
								name="email"
								id="email"
								placeholder="Email"
								required
							/>
						</div>
					</div>
					<div class="row">
						<div class="col-md-6 form-group">
							<input
								type="text"
								name="phone"
								class="form-control"
								id="name"
								placeholder="Phone"
								pattern="[6789][0-9]{9}"
								maxlength="10"
								required
							/>
						</div>
						<div class="col-md-6 form-group mt-3 mt-md-0">
							<select name="dept" class="form-control" id="dept" required>
								<option value="" selected disabled>Select Department</option>
								{% for de in depts %}
								<option value="{{de.id}}">{{de.department}}</option>
								{% endfor %}
							</select>
						</div>
					</div>
					<div class="row">
						<div class="col-md-12 form-group">
							<textarea
						    name="address"
						    class="form-control"
						    id="name"
						    placeholder="Address"
						    title="Address"
						    required
						></textarea>

						</div>
					</div>
					<div class="text-center">
						<button type="submit" id="subBtn">Submit</button>
					</div>
				</form>
				<div class="{{sty}}" id="messageDiv">{{msg}}</div>
			</div>
		</div>
	</div>
</section>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
	$(document).ready(function () {
		$('#dept').change(function () {
			var y = $('#dept').val();
			$('#course')
				.find('option')
				.remove()
				.end()
				.append('<option selected disabled>Select Course</option>')
				.val('whatever');
			$.ajax({
				url: '/getcourse?id=' + y,
				type: 'GET',
				success: function (data) {
					var jsondata = $.parseJSON(data);

					$(jsondata).each(function (index, o) {
						$('#course').append(
							$('<option></option>').text(o[2]).attr('value', o[0])
						);
					});
				},
			});
		});
	});
</script>
<script>
	$(document).ready(() => {
		$('#messageDiv').fadeOut(5000);
	});
</script>
{% endblock %}
