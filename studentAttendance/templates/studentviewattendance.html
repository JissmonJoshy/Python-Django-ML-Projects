{% extends "studentbase.html" %} {% block content %}
<section id="contact" class="contact">
	<div class="container">
		<div class="section-title">
			<h2>VIEW</h2>
			<h3>ATTEN<span>DANCE</span></h3>
		</div>

		
		<div class="w3-services-grids py-lg-4 text-center" style="padding: 20px">
			<form method="post">
				{% csrf_token %}
				<input type="date" name="date" id="" required>
				<input type="submit" value="Filter" class="btn btn-primary">
			</form>
			<div class="fea-gd-vv row">
				{% for s in data %}
				<div
					class="col-lg-4 col-md-7 alert-info"
					style="margin-bottom: 30px; padding-bottom: 30px; border-radius: 20px"
				>
					<div class="feature-gd icon-yellow">
						<div class="icon alert-info"></div>
						<div class="info alert-info p-2" style="margin-top: 50px">
							<h3>{{s.status}}</h3>
							<h5>Date: {{s.date}}</h5>
							<h5>Time: {{s.time}}</h5>
						</div>
					</div>
				</div>
				{% endfor %}
			</div>
		</div>
	</div>
</section>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
	$(document).ready(() => {
		$('#messageDiv').fadeOut(5000);
	});
</script>
{% endblock %}
