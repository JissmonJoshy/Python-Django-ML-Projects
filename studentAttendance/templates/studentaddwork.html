{% extends "studentbase.html" %} {% block content %}
<style>
	td,
	th {
		padding: 10px;
	}
	.result {
		border-radius: 50px;
		background: #fafafa;
		box-shadow: 20px 20px 39px #d5d5d5, -20px -20px 39px #ffffff;
		width: 300px;
		height: 300px;
		display: flex;
		justify-content: center;
		align-items: center;
		margin: auto;
		margin-top: 20px;
	}
</style>
<section id="contact" class="contact">
	<div class="container">
		<div class="section-title">
			<!-- <h2>VIEW</h2>
			<h3>STUD<span>ENTS</span></h3> -->
		</div>

		<div class="row mt-5">
			<div style="text-align: center">
				<form method="POST" enctype="multipart/form-data">
					{% csrf_token %}
					<h3 style="margin: 20px">Assign Work</h3>
					<table style="margin: auto">
						<tr>
							<td>Reg.No</td>
							<td>
								<input
									type="text"
									class="form-control"
									name="regno"
									value="{{work.student.admno}}"
									readonly
									required
								/>
							</td>
						</tr>
						<tr>
							<td>Name</td>
							<td>
								<input
									type="text"
									class="form-control"
									name="name"
									value="{{work.student.name}}"
									readonly
									required
								/>
							</td>
						</tr>
						<tr>
							<td>Course</td>
							<td>
								<input
									type="text"
									class="form-control"
									name="course"
									value="{{work.student.course.course}}"
									readonly
									required
								/>
							</td>
						</tr>
						<tr>
							<td>Work</td>
							<td>
								<textarea type="text" class="form-control" name="work" required>
{{work.work}}</textarea
								>
							</td>
						</tr>
						<tr>
							<td>Report</td>
							<td>
								<input
									type="file"
									class="form-control"
									name="subWork"
									required
								/>
							</td>
						</tr>

						<tr>
							<td></td>
							<td>
								<input
									type="submit"
									class="btn btn-primary"
									name="btnSubmit"
									value="Submit"
									required
								/>
							</td>
						</tr>
					</table>
				</form>
			</div>
		</div>
	</div>
</section>
<script>
	var msg = '{{msg}}';
	if (msg != '') alert(msg);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
	$(document).ready(() => {
		$('#messageDiv').fadeOut(5000);
	});
</script>
{% endblock %}
