{% extends "admin/common.html" %}
{% block content %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-xl-6 col-lg-7 col-md-9">

            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Edit Exam Schedule</h5>
                </div>

                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <select name="subject" class="form-select" required>
                                {% for s in subjects %}
                                <option value="{{ s.id }}" {% if s.id == exam.subject.id %}selected{% endif %}>
                                    {{ s.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Exam Date</label>
                                <input type="date" name="exam_date"
                                       value="{{ exam.exam_date|date:'Y-m-d' }}"
                                       class="form-control" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Start Time</label>
                                <input type="time" name="start_time"
                                       value="{{ exam.start_time|time:'H:i' }}"
                                       class="form-control" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">End Time</label>
                                <input type="time" name="end_time"
                                       value="{{ exam.end_time|time:'H:i' }}"
                                       class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Hall</label>
                            <select name="hall" class="form-select" required>
                                {% for h in halls %}
                                <option value="{{ h.id }}" {% if h.id == exam.hall.id %}selected{% endif %}>
                                    {{ h.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-flex justify-content-center gap-3">
                            <button type="submit" class="btn btn-success px-4">Update</button>
                            <a href="{% url 'view_exam_schedules' %}" class="btn btn-secondary px-4">Back</a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
