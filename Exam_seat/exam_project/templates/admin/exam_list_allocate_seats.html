{% extends "admin/common.html" %}
{% block content %}

<div style="padding:20px; max-width:1200px; margin:auto;">
    <h2 style="text-align:center; margin-bottom:30px;">Allocate Seats – Exams</h2>

    <div style="overflow-x:auto;"> <!-- Makes table scrollable on small screens -->
        <table style="width:100%; border-collapse:collapse; min-width:600px;">
            <thead style="background:#4CAF50; color:white;">
                <tr>
                    <th style="padding:12px; text-align:left;">Subject</th>
                    <th style="padding:12px; text-align:left;">Date</th>
                    <th style="padding:12px; text-align:left;">Hall</th>
                    <th style="padding:12px; text-align:center;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for exam in exams %}
                <tr style="border-bottom:1px solid #ddd;">
                    <td style="padding:10px;">{{ exam.subject.name }}</td>
                    <td style="padding:10px;">{{ exam.exam_date }}</td>
                    <td style="padding:10px;">{{ exam.hall.name }}</td>
                    <td style="padding:10px; text-align:center;">
                        <a href="{% url 'allocate_seats' exam.id %}" 
                           style="padding:6px 12px; background:green; color:white; border-radius:5px; text-decoration:none;">
                           Allocate Seats
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" style="padding:15px; text-align:center; color:#555;">
                        No exams scheduled.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<style>
    @media screen and (max-width:768px) {
        table thead {
            display: none; /* hide headers on small screens */
        }
        table, tbody, tr, td {
            display: block;
            width: 100%;
        }
        tr {
            margin-bottom:15px;
            border-bottom:2px solid #eee;
        }
        td {
            padding:10px;
            text-align: right;
            position: relative;
        }
        td::before {
            content: attr(data-label);
            position: absolute;
            left:10px;
            width:50%;
            text-align:left;
            font-weight:bold;
            color:#333;
        }
        td:last-child {
            text-align:center;
        }
    }
</style>

{% endblock %}
