{% extends "common.html" %}
{% load static %}
{% block content %}

<main class="main">

<div class="login-area py-120">
<div class="container">
<div class="col-md-5 mx-auto">

<div class="login-form">

<div class="login-header">
<img src="{% static "assets/img/logo/logo.png" %}">
<p>Student Login</p>
</div>

<form method="POST">
{% csrf_token %}

<div class="form-group">
<label>Username / Register Number</label>
<input type="text" name="username" class="form-control"
placeholder="Username or Register No" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" class="form-control"
placeholder="Your Password" required>
</div>

<!-- CAMERA -->
<div class="text-center mb-3">
<video id="video" width="320" height="240" autoplay
style="border-radius:10px;"></video>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<input type="hidden" name="captured_image" id="captured_image">

<div class="d-flex align-items-center">
<button type="submit" class="theme-btn">
<i class="far fa-sign-in"></i> Login
</button>
</div>

</form>

<div class="login-footer">
<p>Don't have an account?
<a href="{% url 'student_register' %}">Register</a></p>
</div>

</div>
</div>
</div>
</div>

</main>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const capturedInput = document.getElementById('captured_image');

// Start camera
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;
})
.catch(()=>{
alert("Camera permission required");
});

// Capture image before form submit
document.querySelector("form").addEventListener("submit",function(){

const context = canvas.getContext("2d");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

context.drawImage(video,0,0,canvas.width,canvas.height);

const imageData = canvas.toDataURL("image/png");

capturedInput.value = imageData;

});

</script>

{% endblock %}
