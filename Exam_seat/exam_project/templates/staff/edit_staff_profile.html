{% extends "staff/common.html" %}
{% load static %}
{% block content %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-xl-8 col-lg-9 col-md-11">

            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white text-center">
                    <h5 class="mb-0">Edit Profile</h5>
                </div>

                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <!-- Image Preview -->
                        <div class="text-center mb-4">
                            <img src="{{ staff.image.url }}"
                                 class="rounded-circle shadow"
                                 style="width:120px;height:120px;object-fit:cover;">
                            <p class="text-muted mt-2 mb-0">Current Profile Image</p>
                        </div>

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text"
                                       name="full_name"
                                       value="{{ staff.full_name }}"
                                       class="form-control"
                                       required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input type="text"
                                       name="phone"
                                       value="{{ staff.phone }}"
                                       class="form-control"
                                       required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Department</label>
                                <select name="department"
                                        class="form-select"
                                        required>
                                    {% for d in departments %}
                                    <option value="{{ d.id }}"
                                        {% if staff.department.id == d.id %}selected{% endif %}>
                                        {{ d.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Change Profile Image</label>
                                <input type="file"
                                       name="image"
                                       class="form-control">
                                <small class="text-muted">
                                    Leave blank to keep existing image
                                </small>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <textarea name="address"
                                          rows="3"
                                          class="form-control"
                                          required>{{ staff.address }}</textarea>
                            </div>

                        </div>

                        <!-- Centered Buttons -->
                        <div class="d-flex justify-content-center gap-3 mt-4">
                            <a href="{% url 'staff_profile' %}"
                               class="btn btn-outline-secondary px-4">
                                Cancel
                            </a>
                            <button type="submit"
                                    class="btn btn-success px-4">
                                Update Profile
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
