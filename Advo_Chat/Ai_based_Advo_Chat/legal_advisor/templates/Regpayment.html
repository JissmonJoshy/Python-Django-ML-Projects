{% extends 'common.html' %}
{% block header %}

<style>
body{ background:#f4f7fb; }

.payment-box{
    max-width:900px;
    margin:50px auto;
    background:white;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
    overflow:hidden;
}

.left-box{
    background:linear-gradient(135deg,#0d6efd,#00c6ff);
    color:white;
    padding:30px;
}

.right-box{ padding:30px; }

.form-control{
    height:45px;
    border-radius:8px;
}

.error{
    color:red;
    font-size:12px;
}

.pay-btn{
    height:50px;
    border-radius:8px;
    font-weight:bold;
}
</style>

<div class="payment-box">
<div class="row g-0">

<div class="col-md-5 left-box">
    <h4>Payment Summary</h4>
    <p>Advocate Registration Fee</p>
    <div style="font-size:28px;font-weight:bold;">₹1000</div>
</div>

<div class="col-md-7 right-box">

<h4>Payment Details</h4>

<form method="post" onsubmit="return validateForm()">
{% csrf_token %}

<!-- CARD -->
<label>Card Number</label>
<input type="text" id="cardNumber" name="card"
class="form-control mb-1"
placeholder="1234 5678 9012 3456"
oninput="formatCard(); validateCard()">
<div id="cardError" class="error"></div>

<!-- ROW -->
<div class="row">
<div class="col-md-6">
<label>Expiry</label>
<input type="text" id="expiry" name="expiry"
class="form-control mb-1"
placeholder="MM/YY"
oninput="formatExpiry(); validateExpiry()">
<div id="expiryError" class="error"></div>
</div>

<div class="col-md-6">
<label>CVV</label>
<input type="password" id="cvv" name="cvv"
class="form-control mb-1"
placeholder="123"
oninput="validateCVV()">
<div id="cvvError" class="error"></div>
</div>
</div>

<button type="submit" class="btn btn-primary pay-btn w-100 mt-3">
Pay ₹1000
</button>

</form>
</div>
</div>
</div>

<script>
// FORMAT CARD
function formatCard(){
    let input = document.getElementById("cardNumber");
    let value = input.value.replace(/\D/g,'').substring(0,16);
    let formatted = value.match(/.{1,4}/g);
    input.value = formatted ? formatted.join(" ") : value;
}

// FORMAT EXPIRY
function formatExpiry(){
    let input = document.getElementById("expiry");
    let value = input.value.replace(/\D/g,'').substring(0,4);

    if(value.length >= 3){
        input.value = value.substring(0,2) + '/' + value.substring(2);
    } else {
        input.value = value;
    }
}

// VALIDATE CARD
function validateCard(){
    let card = document.getElementById("cardNumber").value.replace(/\s/g,'');
    let error = document.getElementById("cardError");

    if(card.length !== 16){
        error.innerHTML = "Card must be 16 digits";
        return false;
    } else {
        error.innerHTML = "";
        return true;
    }
}

// VALIDATE CVV
function validateCVV(){
    let cvv = document.getElementById("cvv").value;
    let error = document.getElementById("cvvError");

    if(!/^[0-9]{3}$/.test(cvv)){
        error.innerHTML = "Invalid CVV";
        return false;
    } else {
        error.innerHTML = "";
        return true;
    }
}

// VALIDATE EXPIRY (IMPORTANT 🔥)
function validateExpiry(){
    let expiry = document.getElementById("expiry").value;
    let error = document.getElementById("expiryError");

    if(!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)){
        error.innerHTML = "Invalid format (MM/YY)";
        return false;
    }

    let parts = expiry.split('/');
    let month = parseInt(parts[0]);
    let year = parseInt("20" + parts[1]);

    let today = new Date();
    let currentMonth = today.getMonth() + 1;
    let currentYear = today.getFullYear();

    if(year < currentYear || (year === currentYear && month < currentMonth)){
        error.innerHTML = "Card expired";
        return false;
    }

    error.innerHTML = "";
    return true;
}

// FINAL FORM VALIDATION
function validateForm(){
    let c = validateCard();
    let e = validateExpiry();
    let v = validateCVV();

    return c && e && v;
}
</script>

{% endblock %}
