{% extends 'User/common.html' %}
{% block content %}
{% load static %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">
            <div class="card shadow p-4">

                <h4 class="text-center mb-4">My Profile</h4>

                <div class="text-center mb-3">
                    {% if user.image %}
                        <img src="{{ user.image.url }}" class="rounded-circle"
                             style="width:120px; height:120px; object-fit:cover;">
                    {% else %}
                        <img src="{% static 'images/default-avatar.png' %}" class="rounded-circle"
                             style="width:120px; height:120px; object-fit:cover;">
                    {% endif %}
                </div>

                <table class="table table-bordered">
                    <tr>
                        <th>First Name</th>
                        <td>{{ user.firstName }}</td>
                    </tr>
                    <tr>
                        <th>Last Name</th>
                        <td>{{ user.lastName }}</td>
                    </tr>
                    <tr>
                        <th>Email</th>
                        <td>{{ user.email }}</td>
                    </tr>
                    <tr>
                        <th>Phone</th>
                        <td>{{ user.phone }}</td>
                    </tr>
                    <tr>
                        <th>Place</th>
                        <td>{{ user.place }}</td>
                    </tr>
                </table>

                <div class="text-center mt-2">
                    <a href="/edit_user_profile/" class="btn btn-primary">Edit Profile</a>
                </div>


            </div>
        </div>

    </div>
</div>
<br><br>
{% endblock %}
