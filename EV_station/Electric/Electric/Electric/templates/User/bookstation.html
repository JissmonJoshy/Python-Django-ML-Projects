{% extends 'User/common.html' %}
{% block content %}
{% load static %}
<br><br><br>
<h2 style="text-align: center;">BooKing</h2>
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="text-center">Book a Station</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="station" class="form-label">Station:</label>
                    <select name="station_id" class="form-select">
                        {% for station in stations %}
                            <option value="{{ station.id }}">{{ station.station_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="date" class="form-label">Date:</label>
                    <input class="form-control" type="date" name="date" required id="station_name" placeholder="station_name">
                </div>
                <div class="mb-3">
                    <label for="start_time" class="form-label">Start Time:</label>
                    <input class="form-control" type="time" name="start_time" id="start_time" placeholder="start_time" required>
                </div>
                <div class="mb-3">
                    <label for="end_time" class="form-label">End Time:</label>
                    <input class="form-control" type="time" name="end_time" id="end_time" placeholder="end_time" required>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary">Book</button>
                </div>
            </form>
        </div>
    </div>
</div>
<br><br><br>
{% endblock %}
