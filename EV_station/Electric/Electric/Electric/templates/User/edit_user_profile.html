{% extends 'User/common.html' %}
{% block content %}
{% load static %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-6">
            <div class="card shadow p-4">

                <h4 class="text-center mb-4">Edit Profile</h4>

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>First Name</label>
                        <input type="text" name="firstName" value="{{ user.firstName }}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Last Name</label>
                        <input type="text" name="lastName" value="{{ user.lastName }}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ user.email }}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Phone</label>
                        <input type="text" name="phone" value="{{ user.phone }}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Place</label>
                        <input type="text" name="place" value="{{ user.place }}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Profile Image</label>
                        <input type="file" name="image" class="form-control">
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-success">Update</button>
                        <a href="{% url 'user_profile' %}" class="btn btn-secondary">Cancel</a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

<br><br>
{% endblock %}
