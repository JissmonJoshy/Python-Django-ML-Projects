{% extends 'userBase.html' %}
{% block content %}
<br><br>
<div class="page-heading header-text">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h3>Feedback</h3>
      </div>
    </div>
  </div>
</div>

<section class="section-padding section-bg" style="min-height:40vh">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10 col-12">
        <div class="card shadow-sm p-4 rounded-4 bg-white">
          <form method="post" class="custom-form contact-form" role="form" enctype="multipart/form-data">
            {% csrf_token %}
            
            <!-- Feedback Input -->
            <div class="form-floating mb-4">
              <textarea name="feedback" 
                        id="feedback" 
                        class="form-control" 
                        placeholder="Add Feedback" 
                        style="height: 150px;" 
                        required></textarea>
              <label for="feedback">Add Feedback</label>
            </div>

            <!-- Submit Button -->
            <div class="text-center">
              <button type="submit" class="btn btn-primary px-4 py-2">
                Submit
              </button>
            </div>
          </form>

          {% if data %}
          <div class="mt-4 text-center">
            <h5>Output File:</h5>
            <a href="/static/media/{{ data.encodeImage }}" 
               class="btn btn-outline-success btn-sm" 
               download>
               Download
            </a>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</section>
<br><br>
{% endblock %}
