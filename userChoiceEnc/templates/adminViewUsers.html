{% extends 'adminBase.html' %}
{% block content %}
<br><br>
<div class="page-heading header-text">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h3>Registered Users</h3>
      </div>
    </div>
  </div>
</div>

<section class="section-padding section-bg" style="min-height:40vh">
  <div class="container">
    <div class="row">
      <div class="col-lg-10 col-12 mx-auto mt-5">
        <div class="table-responsive">
          <table class="table table-bordered table-striped table-hover align-middle text-center shadow-sm">
            <thead class="table-dark">
              <tr>
                <th scope="col">Sl/No.</th>
                <th scope="col">Name</th>
                <th scope="col">Email</th>
              </tr>
            </thead>
            <tbody>
              {% for d in data %}
              <tr>
                <td>{{ forloop.counter }}</td>
                <td class="text-capitalize">{{ d.first_name }}</td>
                <td>{{ d.username }}</td>
              </tr>
              {% empty %}
              <tr>
                <td colspan="3" class="text-center text-muted">No users found</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</section>
<br><br>
{% endblock %}
