{% extends "commonBase.html" %}
{% block content %}

<!-- Start Page Title Area -->
<div class="page-title-area">
    <div class="container">
        <div class="page-title-content text-center">
            <h1>Register</h1>
            <ul class="list-unstyled ps-0 mb-0">
                <li class="d-inline-block">
                    <a class="text-decoration-none" href="/">Home</a>
                </li>
                <li class="d-inline-block">Register</li>
            </ul>
        </div>
    </div>
</div>
<!-- End Page Title Area -->

<!-- Start Register Area -->
<div class="login-area ptb-100">
    <div class="container">
        <div class="login-info" data-cue="slideInUp">
            <h1>Register Now</h1>
            <form action="#" method="post" class="custom-form contact-form">
                {% csrf_token %}
                <div class="form-group mb-3">
                    <input type="text" name="name" id="name" class="form-control" placeholder="Name" required>
                </div>

                <div class="form-group mb-3">
                    <input type="email" name="email" id="email" pattern="[^ @]*@[^ @]*" class="form-control" placeholder="Email address" required>
                </div>

                <div class="form-group mb-3">
                    <button class="default-btn border-0 w-100" type="submit">
                        <i class="ri-arrow-right-line"></i>
                        Send OTP
                    </button>
                </div>

                {% if msg %}
                    <p style="color:red; text-align:center; margin-top:10px;">{{ msg }}</p>
                {% endif %}

                <p class="mt-3">Already have an account? 
                    <a class="text-decoration-none" href="/login">Login Here</a>
                </p>
            </form>
        </div>
    </div>
</div>
<!-- End Register Area -->

{% endblock %}
