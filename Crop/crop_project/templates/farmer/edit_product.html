{% extends "farmer/common.html" %}
{% block content %}
<br><br><br><br><br><br><br><br><br><br><br>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-warning text-center">
                    <h4>Edit Product</h4>
                </div>

                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <input type="text" name="product_name" class="form-control mb-3"
                               value="{{ product.product_name }}" required>

                        <select name="category" class="form-control mb-3" required>
                            <option value="Fruit" {% if product.category == 'Fruit' %}selected{% endif %}>Fruit</option>
                            <option value="Vegetable" {% if product.category == 'Vegetable' %}selected{% endif %}>Vegetable</option>
                        </select>

                        <input type="number" name="quantity" class="form-control mb-3"
                               value="{{ product.quantity }}" required>

                        <input type="number" step="0.01" name="price" class="form-control mb-3"
                               value="{{ product.price }}" required>

                        <textarea name="description" class="form-control mb-3">{{ product.description }}</textarea>

                        <label>Current Image</label><br>
                        <img src="{{ product.image.url }}" width="120" class="mb-3"><br>

                        <input type="file" name="image" class="form-control mb-3">

                        <button type="submit" class="btn btn-success w-100">
                            Update Product
                        </button>
                    </form>
                </div>

            </div>

        </div>
    </div>
</div>

{% endblock %}
