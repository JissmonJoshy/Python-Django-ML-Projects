{% extends "farmer/common.html" %}
{% load static %}

{% block content %}
<br><br><br><br><br><br><br><br><br><br><br>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h4>Add Harvested Product</h4>
                </div>

                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <input type="text" name="product_name" class="form-control" placeholder="Product Name" required>
                        </div>

                        <div class="mb-3">
                            <select name="category" class="form-control" required>
                                <option value="">Select Category</option>
                                <option value="Fruit">Fruit</option>
                                <option value="Vegetable">Vegetable</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <input type="number" name="quantity" class="form-control" placeholder="Quantity (Kg)" required>
                        </div>

                        <div class="mb-3">
                            <input type="number" step="0.01" name="price" class="form-control" placeholder="Price per Kg" required>
                        </div>

                        <div class="mb-3">
                            <textarea name="description" class="form-control" placeholder="Description"></textarea>
                        </div>

                        <div class="mb-3">
                            <input type="file" name="image" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Add Product
                        </button>
                    </form>
                </div>

            </div>

        </div>
    </div>
</div>

<br><br><br><br>

{% endblock %}
