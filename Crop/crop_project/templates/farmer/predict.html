{% extends "farmer/common.html" %}
{% block content %}

<style>
    body {
        font-family: Arial, sans-serif;
    }

    .prediction-wrapper {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .prediction-card {
        width: 100%;
        max-width: 500px;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .prediction-card h2 {
        text-align: center;
        margin-bottom: 20px;
        color: darkgreen;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
    }

    select,
    input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid gray;
        font-size: 14px;
    }

    button {
        width: 100%;
        background: green;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: darkgreen;
    }

    .result-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        background: #f4fff4;
        border-left: 5px solid green;
    }

    .result-box h3 {
        margin: 0 0 10px;
        color: darkred;
    }

    @media (max-width: 600px) {
        .prediction-card {
            padding: 18px;
        }
    }
</style>
<br><br><br><br><br><br><br><br><br>
<div class="prediction-wrapper">
    <div class="prediction-card">

        <h2>Crop Disease Prediction</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Crop</label>
                <select name="crop" required>
                    {% for c in crops %}
                    <option value="{{ c }}">{{ c }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Temperature (°C)</label>
                <input type="number" step="0.1" name="temperature" required>
            </div>

            <div class="form-group">
                <label>Humidity (%)</label>
                <input type="number" step="0.1" name="humidity" required>
            </div>

            <div class="form-group">
                <label>Soil Moisture (%)</label>
                <input type="number" step="0.1" name="soil" required>
            </div>

            <div class="form-group">
                <label>Rainfall (mm)</label>
                <input type="number" step="0.1" name="rainfall" required>
            </div>

            <button type="submit">Predict Disease</button>
        </form>

        {% if disease %}
        <div class="result-box">
            <h3>Predicted Disease: {{ disease }}</h3>
            <p><strong>Suggestion:</strong> {{ suggestion }}</p>
        </div>
        {% endif %}

    </div>
</div>
<br><br>
{% endblock %}
