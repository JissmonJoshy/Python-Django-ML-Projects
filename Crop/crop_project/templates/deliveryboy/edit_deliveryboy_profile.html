{% extends "deliveryboy/common.html" %}
{% block content %}
<br><br><br><br>
<br><br><br><br><br>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7 col-sm-12">

            <div class="card shadow-sm border-0">
                <div class="card-body">

                    <h4 class="text-center mb-4">Edit Profile</h4>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text"
                                   name="full_name"
                                   class="form-control"
                                   value="{{ boy.full_name }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   name="phone"
                                   class="form-control"
                                   value="{{ boy.phone }}"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Address</label>
                            <textarea name="address"
                                      class="form-control"
                                      rows="3"
                                      required>{{ boy.address }}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'deliveryboy_profile' %}"
                               class="btn btn-secondary">
                                Back
                            </a>

                            <button type="submit"
                                    class="btn btn-success">
                                Update
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<br><br><br><br>

{% endblock %}
