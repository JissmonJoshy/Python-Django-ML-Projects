{% extends "admin/common.html" %}
{% load static %}

{% block content %}
<br><br><br><br><br><br><br><br>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Edit Government Officer</h4>
                </div>

                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email"
                                   value="{{ login_user.email }}"
                                   class="form-control" readonly>
                        </div>

                        <div class="mb-3">
                            <label>Full Name</label>
                            <input type="text" name="full_name"
                                   value="{{ officer.full_name }}"
                                   class="form-control" required>
                        </div>

                        

                        <div class="mb-3">
                            <label>Phone</label>
                            <input type="text" name="phone"
                                   value="{{ officer.phone }}"
                                   class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Department</label>
                            <input type="text" name="department"
                                   value="{{ officer.department }}"
                                   class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Current Image</label><br>
                            <img src="{{ officer.image.url }}" width="80" class="rounded mb-2">
                        </div>

                        <div class="mb-3">
                            <label>Change Image</label>
                            <input type="file" name="image" class="form-control">
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-success">
                                Update
                            </button>
                            <a href="{% url 'admin_view_officers' %}" class="btn btn-secondary">
                                Back
                            </a>
                        </div>

                    </form>
                </div>

            </div>

        </div>
    </div>
</div>

{% endblock %}
