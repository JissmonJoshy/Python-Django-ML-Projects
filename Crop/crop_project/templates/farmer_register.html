{% extends "common.html" %}
{% load static %}
{% block content %}

<!-- Page Header -->
<div class="page-header bg-section dark-section parallaxie">
    <div class="container">
        <h1 class="text-anime-style-3">Farmer Registration</h1>
    </div>
</div>

<div class="page-contact-us">
    <div class="container">
        <div class="row">
            <div class="col-xl-6">
                <div class="contact-us-image-box">
                    <img src="{% static "images/contact-us-img.jpg" %}" class="img-fluid">
                </div>
            </div>

            <div class="col-xl-6">
                <div class="contact-us-form">
                    <div class="section-title">
                        <h2>Join as Farmer</h2>
                        <p>Your account will be activated after admin approval.</p>
                    </div>

                    <form action="{% url 'farmer_register' %}" method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row">

                            <div class="form-group col-md-6 mb-4">
                                <input type="text" name="fname" class="form-control" placeholder="First Name *" required>
                            </div>

                            <div class="form-group col-md-6 mb-4">
                                <input type="text" name="lname" class="form-control" placeholder="Last Name *" required>
                            </div>

                           <div class="form-group col-md-6 mb-4">
                                <input type="email" name="email" class="form-control"
                                pattern="[a-z0-9._%+-]+@gmail\.(com|in)$"
                                placeholder="Email (gmail only) *" required>
                            </div>

                            <div class="form-group col-md-6 mb-4">
                                <input type="text" name="phone" class="form-control"
                                pattern="[0-9]{10}" maxlength="10"
                                placeholder="Phone (10 digits) *" required>
                            </div>

                            <div class="form-group col-md-12 mb-4">
                                <input type="file" name="profile_pic" class="form-control" required>
                            </div>

                            <div class="form-group col-md-12 mb-4">
                                <input type="text" name="address" class="form-control" placeholder="Address *" required>
                            </div>

                            <div class="form-group col-md-12 mb-4">
                                <input type="password" name="password" class="form-control" placeholder="Password *" required>
                            </div>

                            <div class="col-lg-12">
                                <button type="submit" class="btn-default">
                                    <span>Register as Farmer</span>
                                </button>
                                <p class="mt-3 text-warning">
                                    ⚠ Account requires admin approval before login
                                </p>
                            </div>

                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
