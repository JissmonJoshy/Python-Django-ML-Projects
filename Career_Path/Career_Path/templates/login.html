{% extends 'common.html' %}
{% load static %}

{% block content %}

<style>
body{
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

.login-wrapper{
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-card{
    background: rgba(0,0,0,0.6);
    padding: 40px;
    width: 100%;
    max-width: 420px;
    border-radius: 12px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

.login-card h3{
    color: white;
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
}

.form-group{
    margin-bottom: 20px;
    color: white;
}

.form-group label{
    font-size: 14px;
}

.form-control{
    width: 100%;
    height: 48px;
    border-radius: 8px;
    border: none;
    padding: 0 15px;
    margin-top: 8px;
}

.form-control:focus{
    outline: none;
    box-shadow: 0 0 0 2px wheat;
}

.login-btn{
    width: 100%;
    height: 50px;
    border-radius: 8px;
    background: wheat;
    color: black;
    font-weight: 600;
    border: none;
    cursor: pointer;
}

.login-btn:hover{
    background: #f5deb3;
}

.dashboard-btn{
    display: block;
    text-align: center;
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid wheat;
    color: wheat;
    text-decoration: none;
}

.dashboard-btn:hover{
    background: wheat;
    color: black;
}
</style>

<div class="login-wrapper">
    <div class="login-card">
        <h3>Log In</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Email Address *</label>
                <input type="text" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <a href="/" class="dashboard-btn">Go to Dashboard</a>
        </form>
    </div>
</div>

{% endblock %}
