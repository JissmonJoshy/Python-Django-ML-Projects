<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Career Suggestion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Optional: TailwindCSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white shadow-lg rounded-lg p-10 max-w-md text-center">
        <h1 class="text-2xl font-bold text-blue-600 mb-4">Career Suggestion</h1>

        <p class="text-lg text-gray-700 mb-6">
            Based on your skills and interests, we suggest you pursue a career as a:
        </p>

        <!-- Career suggestion result -->
        <h2 class="text-3xl font-extrabold text-green-600 mb-8">
            {{ career }} <!-- Django variable like 'Doctor', 'Engineer' etc. -->
        </h2>

        <!-- Back button -->
        <a href="/client_interests" 
           class="inline-block bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-6 rounded-lg">
            ← Back
        </a>
    </div>

</body>
</html>
