{% extends 'client/common.html' %}
{% block title %}Attempt Quiz{% endblock title %}
{% block content %}

<div class="p-4 w-full">
    <h2 class="text-xl font-bold text-indigo-700 mb-4">
        Quiz: {{ course.name }}
    </h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Compact Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

            {% for q in questions %}
            <div class="bg-white p-3 rounded-md shadow-sm border">

                <p class="text-sm font-semibold mb-2 leading-tight">
                    {{ forloop.counter }}. {{ q.question }}
                </p>

                <div class="space-y-1 text-sm">
                    <label class="flex items-center gap-2">
                        <input type="radio" name="q_{{ q.id }}" value="{{ q.option1 }}" required>
                        <span>{{ q.option1 }}</span>
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="radio" name="q_{{ q.id }}" value="{{ q.option2 }}">
                        <span>{{ q.option2 }}</span>
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="radio" name="q_{{ q.id }}" value="{{ q.option3 }}">
                        <span>{{ q.option3 }}</span>
                    </label>

                    <label class="flex items-center gap-2">
                        <input type="radio" name="q_{{ q.id }}" value="{{ q.option4 }}">
                        <span>{{ q.option4 }}</span>
                    </label>
                </div>

            </div>
            {% endfor %}

        </div>

        <div class="mt-6 text-center">
            <button type="submit"
                class="button-main text-sm bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 transition">
                Submit Quiz
            </button>
        </div>
    </form>
</div>

{% endblock %}
