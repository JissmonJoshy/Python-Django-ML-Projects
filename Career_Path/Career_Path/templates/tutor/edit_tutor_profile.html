{% extends 'tutor/common.html' %}
{% block content %}

<style>
.form-box{
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
}
.form-group{
    margin-bottom: 12px;
}
input{
    width: 100%;
    height: 38px;
    padding: 0 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
.save-btn{
    width: 100%;
    padding: 10px;
    background: #203a43;
    color: white;
    border: none;
    border-radius: 6px;
}
</style>

<div class="form-box">
    <h3>Edit Tutor Profile</h3>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ tutor.name }}" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ tutor.phone }}">
        </div>

        <div class="form-group">
            <label>Qualification</label>
            <input type="text" name="qualification" value="{{ tutor.qualification }}">
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address" value="{{ tutor.address }}">
        </div>

        <div class="form-group">
            <label>Photo</label>
            <input type="file" name="img">
        </div>

        <button type="submit" class="save-btn">Save Changes</button>
    </form>
</div>

{% endblock %}
