{% extends 'tutor/common.html' %}
{% block content %}

<style>
.page-center{
    min-height: calc(100vh - 80px); /* adjust if navbar height differs */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.profile-card{
    width: 100%;
    max-width: 700px;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.profile-img{
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    margin: 10px auto;
}

.info{
    margin-top: 15px;
    text-align: left;
}

.info p{
    margin: 6px 0;
}

.edit-btn{
    margin-top: 18px;
    display: inline-block;
    padding: 8px 18px;
    background: #203a43;
    color: white;
    border-radius: 6px;
    text-decoration: none;
}
</style>

<div class="page-center">
    <div class="profile-card">
        <h3>Tutor Profile</h3>

        {% if tutor.img %}
        <img src="{{ tutor.img.url }}" class="profile-img">
        {% endif %}

        <div class="info">
            <p><strong>Name:</strong> {{ tutor.name }}</p>
            <p><strong>Email:</strong> {{ tutor.email }}</p>
            <p><strong>Phone:</strong> {{ tutor.phone }}</p>
            <p><strong>Qualification:</strong> {{ tutor.qualification }}</p>
            <p><strong>Address:</strong> {{ tutor.address }}</p>
        </div>

        <a href="{% url 'edit_tutor_profile' %}" class="edit-btn">Edit Profile</a>
    </div>
</div>

{% endblock %}
