{% extends 'tutor/common.html' %}
{% block content %}
{% load static %}

<div class="dashboard_project scrollbar_custom w-full bg-surface">

    <div class="max-w-3xl mx-auto mt-10 bg-white shadow-lg rounded-xl p-8">

        <!-- Title -->
        <h2 class="text-2xl font-semibold mb-6 text-center text-gray-700">
            Upload Course Notes (PDF)
        </h2>

        <!-- Form -->
        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <!-- Course Selection -->
            <div>
                <label class="block mb-2 font-medium text-gray-600">Select Course</label>
                <select name="course" required
                    class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    
                    <option value="">-- Select Course --</option>
                    {% for c in courses %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Title -->
            <div>
                <label class="block mb-2 font-medium text-gray-600">Notes Title</label>
                <input type="text" name="title" placeholder="Enter notes title" required
                    class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- File Upload -->
            <div>
                <label class="block mb-2 font-medium text-gray-600">Upload PDF</label>
                <input type="file" name="file" accept="application/pdf" required
                    class="w-full p-3 border rounded-lg bg-gray-50">
                <p class="text-sm text-gray-400 mt-1">Only PDF files allowed</p>
            </div>

            <!-- Submit Button -->
            <div class="text-center">
                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-black px-6 py-2 rounded-lg transition duration-300">
                    Upload Notes
                </button>
            </div>
            <div class="text-center mt-4">
    <a href="/view-notes"
       class="text-blue-600 underline font-medium">
        View Uploaded Notes
    </a>
</div>

        </form>

    </div>

</div>

{% endblock %}
