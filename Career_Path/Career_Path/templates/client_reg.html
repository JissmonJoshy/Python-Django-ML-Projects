{% extends 'common.html' %}
{% load static %}
{% block content %}

<style>
body{
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* Center wrapper */
.register-wrapper{
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* Card */
.register-card{
    background: rgba(0,0,0,0.65);
    padding: 22px 26px;        /* tighter padding */
    width: 100%;
    max-width: 600px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.45);
}

.register-card h3{
    color: white;
    text-align: center;
    margin-bottom: 14px;
    font-size: 21px;
}

/* Form spacing */
.form-group{
    margin-bottom: 10px;       /* tighter */
    color: white;
}

.form-group label{
    font-size: 12.5px;
}

/* Inputs */
.form-control{
    width: 100%;
    height: 38px;              /* shorter input */
    border-radius: 6px;
    border: none;
    padding: 0 10px;
    margin-top: 3px;
    font-size: 13.5px;
}

.form-control:focus{
    outline: none;
    box-shadow: 0 0 0 2px wheat;
}

/* Grid rows */
.form-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

/* Mobile */
@media (max-width: 640px){
    .form-row{
        grid-template-columns: 1fr;
    }
}

/* Button */
.register-btn{
    width: 100%;
    height: 42px;
    border-radius: 6px;
    background: wheat;
    color: black;
    font-weight: 600;
    border: none;
    cursor: pointer;
    margin-top: 8px;
}

.register-btn:hover{
    background: #f5deb3;
}

/* Footer */
.login-link{
    text-align: center;
    margin-top: 10px;
    color: #ddd;
    font-size: 12.5px;
}

.login-link a{
    color: wheat;
    text-decoration: none;
}

.login-link a:hover{
    text-decoration: underline;
}
</style>

<div class="register-wrapper">
    <div class="register-card">
        <h3>Create a Free Account</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            

            <div class="form-row">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" name="password"
                        pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$"
                        class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" name="phone"
                        pattern="[6789][0-9]{9}" maxlength="10"
                        class="form-control" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>DOB *</label>
                    <input type="date" name="dob" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Qualification *</label>
                    <input type="text" name="qua" class="form-control" required>
                </div>
            </div>

            <div class="form-group">
                <label>Address *</label>
                <input type="text" name="address" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Upload Photo *</label>
                <input type="file" name="img" class="form-control" required>
            </div>

            <button type="submit" class="register-btn">Create Account</button>

            <div class="login-link">
                Already have an account?
                <a href="/login">Login</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
