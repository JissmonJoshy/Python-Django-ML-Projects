{% extends 'common.html' %}
{% block content %}

<style>
    .register-container {
        max-width: 520px;
        margin: 40px auto;
        padding: 30px;
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .register-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #d63384;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #444;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    .form-group input:focus {
        outline: none;
        border-color: #d63384;
        box-shadow: 0 0 5px rgba(214, 51, 132, 0.3);
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 15px;
        font-weight: 600;
        color: #444;
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: #d63384;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    .btn-submit:hover {
        background-color: #b02a6f;
    }
</style>

<div class="register-container">
    <h2>Period Tracker Registration</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" placeholder="Enter your age" required>
        </div>

                <div class="form-group">
            <label>Email</label>
            <input type="email"
                name="email"
                placeholder="Enter your email"
                pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                title="Enter a valid email address (example: user@gmail.com)"
                required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text"
                name="phone"
                placeholder="Enter phone number"
                pattern="[0-9]{10}"
                maxlength="10"
                title="Enter a valid 10-digit phone number"
                required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password"
                name="password"
                placeholder="Create password"
                pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[A-Za-z\d@#$%^&+=]{8,}"
                title="Password must be at least 8 characters, include uppercase, lowercase, and a number"
                required>
        </div>

        <div class="form-group">
            <label>Cycle Length (days)</label>
            <input type="number" name="cycle_length" placeholder="Eg: 28">
        </div>

        <div class="form-group">
            <label>Period Duration (days)</label>
            <input type="number" name="period_length" placeholder="Eg: 5">
        </div>

        <div class="form-group">
            <label>Last Period Date</label>
            <input type="date" name="last_period_date">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" name="has_pcos">
            <label>Diagnosed with PCOS</label>
        </div>

        <div class="form-group">
            <label>Weight (kg)</label>
            <input type="number" step="0.1" name="weight">
        </div>

        <div class="form-group">
            <label>Height (cm)</label>
            <input type="number" step="0.1" name="height">
        </div>

        <div class="form-group">
            <label>Profile Image</label>
            <input type="file" name="image">
        </div>

        <button type="submit" class="btn-submit">Register</button>
    </form>
</div>

{% endblock %}
