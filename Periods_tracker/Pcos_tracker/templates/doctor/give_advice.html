{% extends 'doctor/common.html' %}

{% block content %}

<style>
.advice-container {
    max-width: 700px;
    margin: 40px auto;
    padding: 40px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

.advice-container h2 {
    color: #2c3e50;
    margin-bottom: 30px;
    font-size: 28px;
    font-weight: 600;
    text-align: center;
}

.form-group {
    margin-bottom: 25px;
}

.advice-container label {
    display: block;
    color: #2c3e50;
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 15px;
}

.advice-container textarea {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #ecf0f1;
    border-radius: 6px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 14px;
    resize: vertical;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

.advice-container textarea:focus {
    outline: none;
    border-color: #3498db;
    box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
}

.submit-btn {
    width: 100%;
    padding: 12px 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

.submit-btn:active {
    transform: translateY(0);
}
</style>

<div class="advice-container">
    <h2>Doctor Advice</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="home_remedies">Home Remedies</label>
            <textarea name="home_remedies" id="home_remedies" rows="4" placeholder="Enter home remedies recommendations..."></textarea>
        </div>

        <div class="form-group">
            <label for="diet_plan">Diet Plan</label>
            <textarea name="diet_plan" id="diet_plan" rows="4" placeholder="Enter diet plan recommendations..."></textarea>
        </div>

        <div class="form-group">
            <label for="doctor_notes">Doctor Notes</label>
            <textarea name="doctor_notes" id="doctor_notes" rows="4" placeholder="Enter additional doctor notes..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>

{% endblock %}
