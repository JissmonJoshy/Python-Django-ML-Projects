{% extends 'adminpage/common.html' %}
{% block content %}
<div class="container mt-5">
    <h2>Add Doctor</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="name" class="form-label">Name:</label>
            <input type="text" class="form-control" name="name" required>
        </div>

        <div class="mb-3">
            <label for="address" class="form-label">Address:</label>
            <input type="text" class="form-control" name="address" required>
        </div>

        <div class="mb-3">
            <label for="phone" class="form-label">Phone:</label>
            <input type="number" class="form-control" name="phone" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email:</label>
            <input type="email" class="form-control" name="email" required>
        </div>

        <div class="mb-3">
            <label for="qualification" class="form-label">Qualification:</label>
            <input type="text" class="form-control" name="qualification" required>
        </div>

        <div class="mb-3">
            <label for="experience" class="form-label">Experience:</label>
            <input type="text" class="form-control" name="experience" required>
        </div>

        <div class="mb-3">
            <label for="specialization" class="form-label">Specialization:</label>
            <input type="text" class="form-control" name="specialization">
        </div>
        <div class="mb-3">
            <label for="specialization" class="form-label">Password:</label>
            <input type="password" class="form-control" name="password">
        </div>
        <div class="mb-3">
        <label for="license_number" class="form-label">License Number:</label>
        <input type="text" name="license_number" placeholder="License Number" required><br><br>
        </div>
        <div class="mb-3">
        <label for="license_document" class="form-label">License Document:</label>
            <input type="file" name="license_document"><br><br>
        </div>
        <div class="form-group">
            <label>Profile Image</label>
            <input type="file" name="image">
        </div>


        <button type="submit" class="btn btn-primary">Add Doctor</button>
    </form>
</div>
{% endblock %}
